<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guerreiros Poker Team — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0e1217; --panel:#151b23; --panel2:#1b2531; --panel3:#212d3a;
  --border:#26313f; --text:#e8eef5; --muted:#8a97a6; --muted2:#5f6d7d;
  --blue:#4f9dff; --blue-deep:#2b6fd6; --blue-dim:#16304d; --blue-soft:#1d2b3d;
  --red:#f0616d; --red-bg:#2a1418; --green:#43c98a; --green-bg:#10281d;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:inherit}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:236px;flex:0 0 236px;background:linear-gradient(180deg,#131a24,#0e1217);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;padding:0 0 24px}
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.brand .logo{display:flex;align-items:center;gap:10px}
.brand .chip{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--blue-deep));display:flex;align-items:center;justify-content:center;font-weight:800;color:#04101f;box-shadow:0 4px 14px rgba(79,157,255,.35)}
.brand h1{font-size:15px;margin:0;letter-spacing:.3px}
.brand .sub{color:var(--muted);font-size:11px;margin-top:2px}
.navlabel{color:var(--muted2);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;padding:16px 20px 6px}
.navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 20px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;font-size:13px;transition:.12s}
.navitem:hover{background:var(--panel);color:var(--text)}
.navitem.active{background:linear-gradient(90deg,var(--blue-dim),transparent);color:#fff;border-left-color:var(--blue);font-weight:600}
.navitem .badge{font-size:10px;color:var(--muted2)}
.navitem .badge b{color:var(--red)} .navitem .badge i{color:var(--green);font-style:normal}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:16px;padding:16px 26px;border-bottom:1px solid var(--border);background:rgba(14,18,23,.7);backdrop-filter:blur(6px);position:sticky;top:0;z-index:5;flex-wrap:wrap}
.topbar h2{margin:0;font-size:18px;font-weight:700}
.topbar .spacer{flex:1}
.players{display:flex;gap:6px;flex-wrap:wrap}
.pchip{padding:6px 13px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12.5px;font-weight:600;transition:.12s}
.pchip:hover{color:var(--text);border-color:var(--blue-deep)}
.pchip.active{background:var(--blue);border-color:var(--blue);color:#04101f}
.pchip.all.active{background:linear-gradient(135deg,var(--blue),var(--blue-deep))}
.btn{padding:7px 13px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:12.5px;font-weight:600}
.btn:hover{border-color:var(--blue-deep)}
.updated{color:var(--muted2);font-size:11px}
.content{padding:24px 26px 60px;max-width:1400px}

/* legend */
.legend{display:flex;gap:18px;align-items:center;color:var(--muted);font-size:12px;margin:2px 0 20px}
.legend span{display:inline-flex;align-items:center;gap:7px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.dot.n{background:#c9d4e0} .dot.r{background:var(--red)} .dot.g{background:var(--green)}

/* section header */
.secttitle{font-size:22px;font-weight:700;margin:0 0 3px}
.sectsub{color:var(--muted);font-size:13px;margin-bottom:18px}
.pill-counts{display:inline-flex;gap:14px;margin-left:12px;font-size:13px;vertical-align:middle}
.pill-counts b{color:var(--red)} .pill-counts i{color:var(--green);font-style:normal}

/* group card */
.group{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:18px;overflow:hidden;box-shadow:var(--shadow)}
.group>h3{margin:0;padding:12px 16px;font-size:13px;font-weight:700;color:var(--blue);background:var(--panel2);border-bottom:1px solid var(--border);letter-spacing:.2px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 12px;text-align:right;font-variant-numeric:tabular-nums;border-bottom:1px solid #1e2833;white-space:nowrap}
th{color:var(--muted2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0}
td.stat,th.stat{text-align:left;color:var(--text)}
tbody tr:hover{background:var(--panel2)}
td.ref{color:var(--muted2);font-size:12px}
.val{font-weight:700}
.val.normal{color:#eaf1f8} .val.na{color:var(--muted2);font-weight:400}
.val.red{color:var(--red)} .val.green{color:var(--green)}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;margin-left:6px;font-weight:700;vertical-align:middle}
.tag.red{background:var(--red-bg);color:var(--red)} .tag.green{background:var(--green-bg);color:var(--green)}
.faixa{color:var(--muted);font-size:12px}

/* overview */
.ovwrap{overflow-x:auto}
.heat{border-collapse:separate;border-spacing:6px;min-width:900px}
.heat th{font-size:11px;color:var(--muted);text-align:center;padding:4px 6px}
.heat td.pl{text-align:left;font-weight:700;color:var(--text);padding-right:12px}
.cell{min-width:78px;border-radius:9px;background:var(--panel2);border:1px solid var(--border);padding:9px 8px;text-align:center;cursor:pointer;transition:.12s}
.cell:hover{border-color:var(--blue);transform:translateY(-1px)}
.cell .n{font-size:16px;font-weight:800}
.cell .mini{font-size:10.5px;color:var(--muted2);margin-top:2px}
.cell b{color:var(--red)} .cell i{color:var(--green);font-style:normal}
.cell.clean{opacity:.6}
.ovnote{color:var(--muted);font-size:12.5px;margin:16px 0 6px}
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:150px}
.kpi .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:26px;font-weight:800;margin-top:4px}
.kpi .v.blue{color:var(--blue)} .kpi .v.red{color:var(--red)} .kpi .v.green{color:var(--green)}

.hint{color:var(--muted2);font-size:12px}
.loader{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:820px){.sidebar{display:none}.content{padding:16px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><div class="chip">G</div><div><h1>Guerreiros</h1><div class="sub">Poker Team · Mentoria</div></div></div>
    </div>
    <div class="navlabel">Painel</div>
    <div id="nav"></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="topTitle">Visão Geral</h2>
      <div class="spacer"></div>
      <div class="players" id="players"></div>
      <label class="btn" for="file">⭱ Trocar planilha</label>
      <input id="file" type="file" accept=".xlsx" style="display:none">
      <div class="updated" id="updated"></div>
    </div>
    <div class="content" id="content"><div class="loader">Carregando planilha…</div></div>
  </div>
</div>
<script>
const PLAYERS=["Camisa","Danilo","Dudu","Paciraro","Schmidt"];
const XLSX_FILE="Guerreiros_Catalogo.xlsx";
let DATA=null, curSection="__overview__", curPlayer="Todos";

/* ---------- parsing (mirror do catálogo) ---------- */
function toNum(v){
  if(v===null||v===undefined||v==="")return null;
  if(typeof v==="number")return v;
  let s=(""+v).trim().replace(",",".");
  if(s==="-"||s==="–"||s==="--")return null;
  let f=parseFloat(s); return isNaN(f)?null:f;
}
function norm(s){return (s===null||s===undefined?"":(""+s)).trim().toLowerCase();}
function parseWorkbook(wb){
  const sections=[];
  wb.SheetNames.forEach(sh=>{
    if(norm(sh)==="índice"||norm(sh)==="indice")return;
    const ws=wb.Sheets[sh];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    if(!rows.length)return;
    const hdr={}; rows[0].forEach((h,i)=>hdr[norm(h)]=i);
    const ci={nome:hdr["nome da stat"]??0,reg:hdr["reg aggro"],min:hdr["mínimo"]??hdr["minimo"],
      max:hdr["máximo"]??hdr["maximo"],obs:hdr["obs."]??hdr["obs"]};
    const pc={}; PLAYERS.forEach(p=>pc[p]=hdr[p.toLowerCase()]);
    const groups=[]; let cur=null;
    for(let r=1;r<rows.length;r++){
      const row=rows[r]; if(!row)continue;
      const name=row[ci.nome]; const reg=ci.reg!=null?row[ci.reg]:null;
      if(name===null||name===undefined||(""+name).trim()==="")continue;
      if(reg===null||reg===undefined||(""+reg).trim()===""){cur={name:(""+name).trim(),stats:[]};groups.push(cur);continue;}
      if(!cur){cur={name:"",stats:[]};groups.push(cur);}
      const st={stat:(""+name).trim(),reg:toNum(reg),min:ci.min!=null?toNum(row[ci.min]):null,
        max:ci.max!=null?toNum(row[ci.max]):null,vals:{}};
      PLAYERS.forEach(p=>st.vals[p]=pc[p]!=null?toNum(row[pc[p]]):null);
      const o=ci.obs!=null?row[ci.obs]:null; if(o) st.obs=(""+o);
      cur.stats.push(st);
    }
    sections.push({name:sh,groups});
  });
  return {meta:{players:PLAYERS},sections};
}

/* ---------- coloring ---------- */
function classify(v,mn,mx){
  if(v===null||v===undefined)return "na";
  if(mn!==null&&mn!==undefined&&v<mn)return "red";
  if(mx!==null&&mx!==undefined&&v>mx)return "green";
  return "normal";
}
function fmt(v){ if(v===null||v===undefined)return "–"; return (Math.round(v*100)/100); }
function faixaTxt(mn,mx){
  if(mn===null&&mx===null)return "—";
  if(mn!==null&&mx===null)return "≥ "+fmt(mn);
  if(mn===null&&mx!==null)return "≤ "+fmt(mx);
  return fmt(mn)+" – "+fmt(mx);
}
/* count out-of-range for a player in a section */
function countSec(sec,player){
  let r=0,g=0,t=0;
  sec.groups.forEach(gr=>gr.stats.forEach(s=>{
    const ps=player==="Todos"?PLAYERS:[player];
    ps.forEach(p=>{const c=classify(s.vals[p],s.min,s.max); if(c==="red"){r++;t++;} else if(c==="green"){g++;t++;}});
  }));
  return {r,g,t};
}

/* ---------- rendering ---------- */
function renderNav(){
  const nav=document.getElementById("nav");
  let html=`<div class="navitem ${curSection==='__overview__'?'active':''}" data-sec="__overview__"><span>▦ Visão Geral</span></div>`;
  html+=`<div class="navlabel">Seções</div>`;
  DATA.sections.forEach(sec=>{
    const c=countSec(sec,curPlayer==="Todos"?"Todos":curPlayer);
    const badge=(c.r||c.g)?`<span class="badge"><b>${c.r}</b> · <i>${c.g}</i></span>`:`<span class="badge">✓</span>`;
    html+=`<div class="navitem ${curSection===sec.name?'active':''}" data-sec="${sec.name}"><span>${sec.name}</span>${badge}</div>`;
  });
  nav.innerHTML=html;
  nav.querySelectorAll(".navitem").forEach(el=>el.onclick=()=>{curSection=el.dataset.sec;render();});
}
function renderPlayers(){
  const el=document.getElementById("players");
  const opts=["Todos",...PLAYERS];
  el.innerHTML=opts.map(p=>`<div class="pchip ${p==='Todos'?'all':''} ${curPlayer===p?'active':''}" data-p="${p}">${p}</div>`).join("");
  el.querySelectorAll(".pchip").forEach(c=>c.onclick=()=>{curPlayer=c.dataset.p;render();});
}
function valCell(s,p){
  const c=classify(s.vals[p],s.min,s.max);
  const tag=c==="red"?`<span class="tag red">▼</span>`:c==="green"?`<span class="tag green">▲</span>`:"";
  return `<td class="val ${c}">${fmt(s.vals[p])}${tag}</td>`;
}
function renderSection(sec){
  document.getElementById("topTitle").textContent=sec.name;
  const c=countSec(sec,curPlayer);
  const sub= curPlayer==="Todos"
     ? `Comparando os 5 jogadores. <span class="pill-counts"><b>${c.r} abaixo do mín</b> · <i>${c.g} acima do máx</i></span>`
     : `${curPlayer} · <span class="pill-counts"><b>${c.r} abaixo do mín</b> · <i>${c.g} acima do máx</i></span>`;
  let html=`<div class="secttitle">${sec.name}</div><div class="sectsub">${sub}</div>`;
  html+=`<div class="legend"><span><i class="dot n"></i> normal</span><span><i class="dot r"></i> abaixo do mínimo</span><span><i class="dot g"></i> acima do máximo</span></div>`;
  sec.groups.forEach(gr=>{
    if(!gr.stats.length)return;
    html+=`<div class="group">`;
    if(gr.name) html+=`<h3>${gr.name}</h3>`;
    html+=`<table><thead><tr><th class="stat">Stat</th>`;
    if(curPlayer==="Todos"){ PLAYERS.forEach(p=>html+=`<th>${p}</th>`); }
    else { html+=`<th>${curPlayer}</th>`; }
    html+=`<th>Reg</th><th>Faixa</th></tr></thead><tbody>`;
    gr.stats.forEach(s=>{
      html+=`<tr><td class="stat">${s.stat}</td>`;
      if(curPlayer==="Todos"){ PLAYERS.forEach(p=>html+=valCell(s,p)); }
      else { html+=valCell(s,curPlayer); }
      html+=`<td class="ref">${fmt(s.reg)}</td><td class="faixa">${faixaTxt(s.min,s.max)}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  document.getElementById("content").innerHTML=html;
}
function renderOverview(){
  document.getElementById("topTitle").textContent="Visão Geral";
  // KPIs
  let totR=0,totG=0;
  const perPlayer={}; PLAYERS.forEach(p=>perPlayer[p]={r:0,g:0});
  DATA.sections.forEach(sec=>PLAYERS.forEach(p=>{const c=countSec(sec,p);perPlayer[p].r+=c.r;perPlayer[p].g+=c.g;totR+=c.r;totG+=c.g;}));
  let html=`<div class="secttitle">Visão Geral</div><div class="sectsub">Quantas stats de cada jogador estão fora do intervalo, por seção. Clique numa célula pra abrir a seção.</div>`;
  html+=`<div class="kpis">
     <div class="kpi"><div class="k">Jogadores</div><div class="v blue">5</div></div>
     <div class="kpi"><div class="k">Seções</div><div class="v blue">${DATA.sections.length}</div></div>
     <div class="kpi"><div class="k">Abaixo do mínimo</div><div class="v red">${totR}</div></div>
     <div class="kpi"><div class="k">Acima do máximo</div><div class="v green">${totG}</div></div>
  </div>`;
  html+=`<div class="legend"><span><i class="dot r"></i> nº abaixo do mín</span><span><i class="dot g"></i> nº acima do máx</span></div>`;
  html+=`<div class="ovwrap"><table class="heat"><thead><tr><th class="pl"></th>`;
  DATA.sections.forEach(sec=>html+=`<th>${sec.name.replace(' ','<br>')}</th>`);
  html+=`</tr></thead><tbody>`;
  PLAYERS.forEach(p=>{
    html+=`<tr><td class="pl">${p}</td>`;
    DATA.sections.forEach(sec=>{
      const c=countSec(sec,p); const clean=(c.r+c.g)===0;
      html+=`<td><div class="cell ${clean?'clean':''}" data-sec="${sec.name}" data-p="${p}">
        <div class="n"><b>${c.r}</b> <span style="color:var(--muted2)">/</span> <i>${c.g}</i></div>
        <div class="mini">${clean?'ok':'fora'}</div></div></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="ovnote">Legenda por célula: <b style="color:var(--red)">vermelho</b> = stats abaixo do mínimo · <i style="color:var(--green)">verde</i> = acima do máximo.</div>`;
  document.getElementById("content").innerHTML=html;
  document.querySelectorAll(".cell").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection=el.dataset.sec;render();});
}
function render(){
  renderPlayers(); renderNav();
  if(curSection==="__overview__") renderOverview();
  else { const sec=DATA.sections.find(s=>s.name===curSection); if(sec) renderSection(sec); else renderOverview(); }
  window.scrollTo(0,0);
}

/* ---------- loading ---------- */
function setUpdated(txt){document.getElementById("updated").textContent=txt;}
async function loadFromXlsx(){
  try{
    const res=await fetch(XLSX_FILE,{cache:"no-store"});
    if(!res.ok)throw new Error("no xlsx");
    const buf=await res.arrayBuffer();
    DATA=parseWorkbook(XLSX.read(buf,{type:"array"}));
    setUpdated("planilha · "+XLSX_FILE);
    render(); return true;
  }catch(e){return false;}
}
async function loadFromJson(){
  try{
    const res=await fetch("data.json",{cache:"no-store"});
    if(!res.ok)throw new Error("no json");
    DATA=await res.json(); setUpdated("dados embutidos"); render(); return true;
  }catch(e){return false;}
}
document.getElementById("file").addEventListener("change",ev=>{
  const f=ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{DATA=parseWorkbook(XLSX.read(new Uint8Array(e.target.result),{type:"array"}));setUpdated("upload · "+f.name);curSection="__overview__";render();};
  rd.readAsArrayBuffer(f);
});
(async()=>{
  if(await loadFromXlsx())return;
  if(await loadFromJson())return;
  if(window.__EMBEDDED__){DATA=window.__EMBEDDED__;setUpdated("dados embutidos");render();return;}
  document.getElementById("content").innerHTML='<div class="loader">Não consegui carregar a planilha. Use "Trocar planilha" pra enviar o arquivo .xlsx.</div>';
})();
