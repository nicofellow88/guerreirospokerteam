<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guerreiros Poker Team — Leak Finder</title>
<style>
:root{
  --bg:#0e1013; --panel:#16191f; --panel2:#1d222b; --panel3:#242b36;
  --border:#2b3340; --text:#eef1f6; --muted:#95a0af; --muted2:#68727f;
  --gold:#f5b81f; --gold-deep:#c98f0f; --gold-dim:#3a2c07; --gold-soft:#221a06;
  --red:#f0616d; --red-bg:#341419; --green:#43c98a; --green-bg:#123024;
  --shadow:0 10px 30px rgba(0,0,0,.4); --sidebar:linear-gradient(180deg,#161a21,#0e1013);
  --menu:#12151b; --ink:#231602;
}
body.light{
  --bg:#eef1f5; --panel:#ffffff; --panel2:#f0f3f8; --panel3:#e7ebf1;
  --border:#d9dee7; --text:#1b2028; --muted:#5b6672; --muted2:#939caa;
  --gold:#b8860b; --gold-deep:#936a08; --gold-dim:#f6eccf; --gold-soft:#fbf4de;
  --red:#d63a48; --red-bg:#fbe8ea; --green:#1f9d68; --green-bg:#e3f5ec;
  --shadow:0 8px 24px rgba(30,45,70,.10); --sidebar:linear-gradient(180deg,#ffffff,#f2f4f8); --menu:#ffffff;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
.sidebar{width:262px;flex:0 0 262px;background:var(--sidebar);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;padding:0 0 24px}
.brand{padding:16px 16px 14px;border-bottom:1px solid var(--border);text-align:center}
.brand .badge-logo img{width:150px;height:auto;object-fit:contain;display:block;margin:0 auto}
.selwrap{padding:14px 16px 4px}
.sellbl{color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:7px}
.navlabel{color:var(--muted2);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;padding:14px 20px 6px}
.navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 18px 10px 20px;cursor:pointer;color:var(--muted);border-left:3px solid transparent;font-size:14px;transition:.12s}
.navitem:hover{background:var(--panel);color:var(--text)}
.navitem.active{background:linear-gradient(90deg,var(--gold-dim),transparent);color:var(--text);border-left-color:var(--gold);font-weight:700}
.navitem.locked{opacity:.5;cursor:not-allowed}
.navitem.locked:hover{background:none;color:var(--muted)}
.navitem .nm{display:flex;align-items:center;gap:9px;min-width:0}
.navitem .num{color:var(--muted2);font-size:12px;width:16px;text-align:right;flex:0 0 auto}
.navitem.active .num{color:var(--gold)}
.navitem .badge{font-size:12px;color:var(--muted2);white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:700}
.badge .r{color:var(--red)} .badge .g{color:var(--green)} .badge .t{color:var(--muted2);font-weight:600}
.navitem .ok{color:var(--gold);font-weight:800;font-size:12px}
.pdrop{position:relative}
.pdrop-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:14.5px;font-weight:700}
.pdrop-btn:hover{border-color:var(--gold-deep)}
.pdrop-btn .cur{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdrop-btn .cur.bench{color:var(--gold)}
.pdrop-btn .cv{color:var(--muted2);font-size:12px;transition:.15s}
.pdrop.open .pdrop-btn{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,184,31,.15)}
.pdrop.open .cv{transform:rotate(180deg)}
.pdrop-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;max-height:56vh;overflow-y:auto;background:var(--menu);border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);padding:6px;display:none;z-index:40}
.pdrop.open .pdrop-menu{display:block}
.pdrop-opt{display:flex;align-items:center;padding:10px 13px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted)}
.pdrop-opt:hover{background:var(--panel2);color:var(--text)}
.pdrop-opt.active{background:var(--gold);color:var(--ink)}
.pdrop-opt.bench{color:var(--gold)} .pdrop-opt.bench.active{color:var(--ink)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.content{padding:28px 32px 80px;max-width:1620px}
.themebtn{position:fixed;top:16px;right:20px;z-index:70;width:40px;height:40px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.themebtn:hover{border-color:var(--gold)}
.legend{display:flex;gap:20px;align-items:center;color:var(--muted);font-size:13px;margin:2px 0 20px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:8px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.dot.n{background:var(--muted)} .dot.r{background:var(--red)} .dot.g{background:var(--green)}
.diag{background:linear-gradient(100deg,var(--gold-soft),var(--panel) 70%);border:1px solid var(--gold-deep);border-left:4px solid var(--gold);border-radius:14px;padding:18px 22px;margin:4px 0 24px;line-height:1.6;font-size:14.5px}
.diag h4{margin:0 0 9px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.7px;text-transform:uppercase}
.diag b{color:var(--text)}
.secthead{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin:0 0 6px}
.secttitle{font-size:32px;font-weight:800;margin:0;letter-spacing:.2px}
.secttitle .pname{color:var(--gold)}
.counts{display:inline-flex;gap:16px;font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
.counts .r{color:var(--red)} .counts .g{color:var(--green)} .counts .t{color:var(--muted2);font-weight:700}
.arrow{font-size:.82em;vertical-align:middle}
.tblgrid{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
.tblcard{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px 18px;margin-bottom:20px;box-shadow:var(--shadow);display:inline-block;vertical-align:top}
.tblcard h3{margin:0 0 14px;font-size:14px;font-weight:800;color:var(--gold);letter-spacing:.4px;text-transform:uppercase;text-align:center}
.tbl-wrap{overflow-x:auto}
table.mtx,table.strip,table.linetbl{border-collapse:separate;border-spacing:5px;font-variant-numeric:tabular-nums}
.mtx th,.strip th{color:var(--muted2);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px;padding:5px 10px;text-align:center;white-space:nowrap}
.mtx td.corner{color:var(--muted2);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px;text-align:left;padding:5px 12px 5px 6px}
.mtx td.rowh{color:var(--text);font-weight:700;font-size:14px;text-align:left;padding:8px 12px 8px 6px;white-space:nowrap}
.mc{min-width:64px;text-align:center;padding:10px 13px;border-radius:9px;background:var(--panel2);font-weight:700;font-size:16px;transition:.1s;position:relative}
.mc.empty{background:transparent}
.mc.na{color:var(--muted2);font-weight:400;background:var(--panel2)}
.mc.neutral,.mc.normal{color:var(--text)}
.mc.red{color:var(--red);background:var(--red-bg)}
.mc.green{color:var(--green);background:var(--green-bg)}
.mc[data-tip]{cursor:help}
.mc[data-tip]:hover{outline:2px solid var(--gold);outline-offset:-2px}
.strip .mc{min-width:70px}
.linetbl td.ln{color:var(--text);font-size:13.5px;text-align:left;padding:7px 12px 7px 4px;white-space:nowrap;font-weight:600;cursor:help}
.linetbl td.ln:hover{color:var(--gold)}
.linetbl .mc{min-width:74px}
.streets{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
.street{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px 16px;box-shadow:var(--shadow);min-width:220px}
.street h4{margin:0 0 10px;font-size:13px;font-weight:800;color:var(--gold);letter-spacing:.5px}
#tip{position:fixed;z-index:80;background:var(--menu);border:1px solid var(--gold-deep);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--text);box-shadow:var(--shadow);pointer-events:none;opacity:0;transition:opacity .1s;max-width:320px}
#tip .tt{color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.3px;margin-top:7px}
#tip .tt:first-child{margin-top:0}
#tip b{color:var(--gold)}
#tip .att{color:var(--red);font-weight:800} #tip .att.g{color:var(--green)}
.pfhead{font-size:14px;color:var(--muted);margin:0 0 14px}
.pfgroup .glbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);font-weight:800;margin:16px 0 10px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center}
.tile .tv{font-size:36px;font-weight:800;line-height:1}
.tile .tv.red{color:var(--red)} .tile .tv.green{color:var(--green)} .tile .tv.neutral,.tile .tv.normal{color:var(--text)}
.tile .tk{font-size:15px;font-weight:800;margin-top:10px;color:var(--text)}
.tile .td{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.3}
.tile .frng{font-size:11.5px;color:var(--muted2);margin-top:7px;font-variant-numeric:tabular-nums}
.smtitle{font-size:15px;color:var(--muted);margin:26px 0 12px;font-weight:700}
.secmenu{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.seccard{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 16px;cursor:pointer;transition:.12s;text-align:center}
.seccard:hover{border-color:var(--gold);transform:translateY(-1px)}
.seccard .st{font-size:17px;font-weight:800;margin:0 0 12px}
.seccard .sc{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;gap:14px;align-items:center;justify-content:center}
.seccard .sc .r{color:var(--red)} .seccard .sc .g{color:var(--green)} .seccard .sc .ok{color:var(--gold)} .seccard .sc .tt{color:var(--muted2);font-size:14px;font-weight:600}
.kpis{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 22px;min-width:160px;text-align:center}
.kpi .k{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:34px;font-weight:800;margin-top:5px}
.kpi .v.gold{color:var(--gold)} .kpi .v.red{color:var(--red)} .kpi .v.green{color:var(--green)}
.ovwrap{overflow-x:auto}
.heat{border-collapse:separate;border-spacing:8px;min-width:960px}
.heat th{font-size:12px;color:var(--muted);text-align:center;padding:4px 6px;font-weight:700}
.heat td.pl{text-align:left;font-weight:800;color:var(--text);padding-right:14px;cursor:pointer;font-size:15px}
.heat td.pl:hover{color:var(--gold)}
.cell{min-width:92px;border-radius:11px;background:var(--panel2);border:1px solid var(--border);padding:12px 10px;text-align:center;cursor:pointer;transition:.12s;line-height:1.3}
.cell:hover{border-color:var(--gold);transform:translateY(-1px)}
.cell .rr{color:var(--red);font-weight:800;font-size:21px} .cell .gg{color:var(--green);font-weight:800;font-size:21px}
.cell.clean{display:flex;align-items:center;justify-content:center;min-height:76px}
.cell .okbig{color:var(--gold);font-weight:800;font-size:25px;letter-spacing:.5px}
.ovnote{color:var(--muted);font-size:13px;margin:18px 0 6px}
.hint{color:var(--muted2);font-size:13px;margin:10px 0}
.loader{padding:60px;text-align:center;color:var(--muted)}
/* login */
#login{position:fixed;inset:0;z-index:200;background:radial-gradient(circle at 50% 30%,#171b22,#0b0d10);display:flex;align-items:center;justify-content:center}
.lcard{width:360px;max-width:92vw;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.5);padding:30px 28px;text-align:center}
.lcard img{width:120px;margin:0 auto 6px}
.lcard h2{font-size:16px;margin:2px 0 2px;font-weight:800}
.lcard .lsub{color:var(--gold);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:20px}
.lcard label{display:block;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);font-weight:700;margin:12px 0 6px}
.lcard select,.lcard input{width:100%;padding:12px 13px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600}
.lcard input:focus,.lcard select:focus{outline:none;border-color:var(--gold)}
.lbtn{width:100%;margin-top:20px;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:var(--ink);font-size:15px;font-weight:800;cursor:pointer}
.lbtn:hover{filter:brightness(1.05)}
.lerr{color:var(--red);font-size:13px;margin-top:12px;min-height:16px;font-weight:600}
@media(max-width:1000px){.tiles,.secmenu{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.sidebar{position:static;width:100%;height:auto}.app{flex-direction:column}.content{padding:16px}}
</style>
</head>
<body>
<div id="login">
  <div class="lcard">
    <div class="badge-logo"><img id="loginLogo" alt=""></div>
    <h2>Guerreiros Poker Team</h2>
    <div class="lsub">Leak Finder · acesso</div>
    <label>Jogador</label>
    <select id="luser"></select>
    <label>Senha</label>
    <input id="lpass" type="password" placeholder="sua senha" autocomplete="off">
    <button class="lbtn" id="lbtn">Entrar</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>
<button class="themebtn" id="themeBtn" title="Alternar tema" style="display:none">☾</button>
<div class="app" id="app" style="display:none">
  <aside class="sidebar">
    <div class="brand"><div class="badge-logo" id="logoBox"></div></div>
    <div class="selwrap"><div class="sellbl">Jogador</div><div id="playerDrop"></div>
      <div id="sampleWrap" style="margin-top:12px"><div class="sellbl">Sample</div><div id="sampleDrop"></div></div></div>
    <div class="navlabel">Painel</div><div id="nav"></div>
  </aside>
  <div class="main"><div class="content" id="content"><div class="loader">Carregando…</div></div></div>
</div>

const encU=new TextEncoder(), decU=new TextDecoder();
let ENC=null, MASTER=null, DATA=null, ADMIN=false;

/* ===== crypto ===== */
function ub64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function deriveKey(pw,saltB64,iter){const salt=ub64(saltB64);const base=await crypto.subtle.importKey("raw",encU.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);}
async function aesDec(key,ivB64,ctB64){return crypto.subtle.decrypt({name:"AES-GCM",iv:ub64(ivB64)},key,ub64(ctB64));}
async function login(username,pw){
  const key=await deriveKey(pw,ENC.kdf.salt,ENC.kdf.iter);
  async function blobOf(p,wrap){const dekRaw=await aesDec(key,p[wrap].iv,p[wrap].ct);const dekKey=await crypto.subtle.importKey("raw",dekRaw,{name:"AES-GCM"},false,["decrypt"]);return JSON.parse(decU.decode(await aesDec(dekKey,p.data.iv,p.data.ct)));}
  if(username==="__admin__"){const players=[];for(const p of ENC.players)players.push(await blobOf(p,"wrapM"));return {admin:true,players};}
  const p=ENC.players.find(x=>x.name===username);if(!p)throw 0;
  return {admin:false,players:[await blobOf(p,"wrapP")]};
}

const FAMSHORT={"VPIP":"VPIP","PFR":"PFR","3BET":"3-bet","F3BET":"Fold to 3-bet","SQZ":"Squeeze","4BET":"4-bet","F4BET":"Fold to 4-bet","RFI":"Raise","FLAT":"Flat","WR":"Win rate","WWSF":"WWSF","WSD":"WSD","W$SD":"W$SD","SHOVE":"Shove","CALL":"Call","FOLD":"Fold","LIMP/CALL":"Limp/Call","LIMP/FOLD":"Limp/Fold","LIMP/RAISE":"Limp/Raise","R VS L":"Raise vs limp","X VS L":"Check vs limp","3B NAI":"3-bet (sem all-in)","3B AI":"3-bet all-in","3B":"3-bet"};
const POST={"B":"Bet","X":"Check","C":"Call","F":"Fold","R":"Raise","D":"Donk (lead OOP)","Bs":"Bet small","Bb":"Bet big","Fs":"Fold vs small bet","Fb":"Fold vs big bet","Fov":"Fold vs overbet","Cs":"Call small","Rs":"Raise vs small bet","BsF":"Bet small, Fold","BbF":"Bet big, Fold","XFs":"Check-Fold vs small bet","XFb":"Check-Fold vs big bet","XCs":"Check-Call small","XRs":"Check-Raise vs small bet","XF":"Check-Fold","XC":"Check-Call","XR":"Check-Raise","XB":"Check e Bet"};
function whatis(stat){
  const s=(""+stat).trim();
  if(s.indexOf("|")>=0)return s.split("|").map(t=>POST[t.trim()]||t.trim()).join(" → ");
  if(POST[s])return POST[s];
  let m=s.match(/^3BET-RS (.+) vs (.+) \((AI|NAI)\)$/);if(m)return "Resteal (3-bet all-in) · "+m[1]+" vs "+m[2];
  m=s.match(/^F3BET (.+) \((IP|OOP)\)$/);if(m)return "Fold to 3-bet · "+m[1]+" · "+m[2];
  m=s.match(/^3BET (.+) vs (.+)$/);if(m)return "3-bet · "+m[1]+" vs "+m[2];
  if(s.indexOf(" · ")>=0){const a=s.split(" · ");return (FAMSHORT[a[1]]||a[1])+" · "+a[0];}
  m=s.match(/^(VPIP|PFR) (\[.+\]|>.+)$/);if(m)return (FAMSHORT[m[1]]||m[1])+" · faixa "+m[2].replace(/[\[\]]/g,"").replace(";","–")+"bb";
  m=s.match(/^(VPIP|PFR|RFI|3BET|FLAT|F3BET|WR) (.+)$/);if(m)return (FAMSHORT[m[1]]||m[1])+" · "+m[2];
  return FAMSHORT[s]||s;
}
function bucketLabel(g){if(g==="RFI — ALL")return "todos os stacks";if(g.indexOf("< 12")>=0)return "até 12bb";if(g.indexOf("12 - 19")>=0)return "12–19bb";if(g.indexOf("19 - 30")>=0)return "19–30bb";if(g.indexOf("30 - 60")>=0)return "30–60bb";if(g.indexOf("> 60")>=0)return "acima de 60bb";return "";}

function ctxAtt(sec,group){
  if(sec==="Stack Sizes")return " nessa faixa de stack";
  if(sec==="Positions")return " nessa posição";
  if(sec==="Preflop"&&["RFI por posição","3BET por posição","FLAT / CALL por posição"].includes(group))return " nessa posição";
  if(sec==="RFI")return " nessa posição e faixa de stack";
  if(sec==="3Bet Resteal")return " no curto";
  return "";
}
function famDir(sec,group,stat){ // -> {fam,dir?} we compute dir outside; here fam+dim+gl
  const s=stat;
  let m=s.match(/^WR (.+)$/);if(m)return {fam:"WR",dim:m[1],gl:""};
  if(sec==="IP Agressor"||sec==="OOP Agressor"||sec==="IP Passivo"||sec==="OOP Passivo"){
    const st=s.replace(/\s*\([^)]*\)/g,"").trim();const last=st.split("|").pop().trim();
    const F={F:"FOLD",Fs:"FOLD",Fb:"FOLD",Fov:"FOLD",XF:"FOLD",XFs:"FOLD",XFb:"FOLD",BsF:"FOLD",BbF:"FOLD",C:"CALL",Cs:"CALL",XC:"CALL",XCs:"CALL",R:"RAISE",Rs:"RAISE",XR:"RAISE",XRs:"RAISE",B:"BET",Bs:"BET",Bb:"BET",XB:"BET",X:"CHECK",D:"DONK"};
    return {fam:"PF_"+(F[last]||"GEN"),dim:whatis(st),gl:group.toLowerCase()};
  }
  if(sec==="Blind War"){const b=group.match(/^(.*?) — (.*)$/);return {fam:"BW_"+s,dim:b?b[1]:"",gl:b?b[2]:""};}
  if(sec==="BB Defense"){const a=s.split(" · ");const blind=group.indexOf("SMALL")>=0?"SB":"BB";return {fam:"BBD_"+a[1],dim:a[0]==="TOTAL"?"total":a[0],gl:"def. "+blind};}
  m=s.match(/^3BET-RS (.+) vs (.+) \(AI\)$/);if(m)return {fam:"RESTEAL",dim:m[1]+" vs "+m[2],gl:""};
  m=s.match(/^3BET (.+) vs (.+)$/);if(m)return {fam:"3BET_M",dim:m[1]+" vs "+m[2],gl:""};
  m=s.match(/^F3BET (.+) \((IP|OOP)\)$/);if(m)return {fam:"F3BET",dim:m[1],gl:m[2]};
  m=s.match(/^RFI (.+)$/);if(m)return {fam:"RFI",dim:m[1],gl:sec==="RFI"?bucketLabel(group):""};
  if(group==="3BET por posição")return {fam:"3BET",dim:s.replace("3BET ",""),gl:""};
  if(s.startsWith("FLAT"))return {fam:"FLAT",dim:s.replace("FLAT ",""),gl:""};
  m=s.match(/^(VPIP|PFR) (\[.+\]|>.+)$/);if(m)return {fam:m[1],dim:m[2].replace(/[\[\]]/g,"").replace(";","-"),gl:""};
  m=s.match(/^(VPIP|PFR) (.+)$/);if(m)return {fam:m[1],dim:m[2],gl:""};
  if(["VPIP","PFR","3BET","F3BET","SQZ","4BET","F4BET","WWSF","WSD","W$SD"].includes(s))return {fam:s,dim:"",gl:"geral"};
  return {fam:s,dim:"",gl:""};
}

function corr(fam,dir){const c=CORR[fam];if(!c)return "ajustar";return dir==="below"?c[0]:c[1];}
const DIMTYPE={pos:{one:"no",plural:"as posições",many:"em"},faixa:{one:"na faixa",plural:"as faixas",many:"nas faixas"}};
function aggDims(dims,universe,dt){
  dims=[...new Set(dims)];
  if(dt&&universe.length>=3&&dims.length/universe.length>=0.6){
    const exc=universe.filter(u=>!dims.includes(u));
    if(exc.length&&exc.length<=3)return "em quase todas "+dt.plural+" (exceção: "+exc.join(", ")+")";
    return "em quase todas "+dt.plural;
  }
  if(dt==DIMTYPE.faixa)return (dims.length>1?"nas faixas ":"na faixa ")+dims.join(", ");
  if(dt==DIMTYPE.pos)return (dims.length>1?"nas posições ":"no ")+dims.join(", ");
  return dims.length?("em "+dims.join(", ")):"";
}
function dtFor(sec,fam){
  if(sec==="Stack Sizes")return DIMTYPE.faixa;
  if(fam==="RFI"||fam==="VPIP"||fam==="PFR"||fam==="WR"||fam==="FLAT"||fam==="3BET"||fam==="F3BET"||fam.startsWith("BBD"))return DIMTYPE.pos;
  return null;
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function sectionDiag(sec,player){
  const flags=[];
  sec.groups.forEach(g=>g.stats.forEach(s=>{if(!hasRange(s))return;const v=s.vals[player];const c=classify(v,s.min,s.max);if(c==="red"||c==="green"){const fd=famDir(sec.name,g.name,s.stat);flags.push({...fd,dir:c==="red"?"below":"above"});}}));
  if(!flags.length)return "Tudo dentro do alvo nessa seção. 👊";
  const groups={};
  flags.forEach(f=>{const k=f.fam+"|"+f.dir+"|"+(f.gl||"");if(!groups[k])groups[k]={fam:f.fam,dir:f.dir,gl:f.gl,dims:[]};groups[k].dims.push(f.dim);});
  // universo por fam+gl
  function universe(fam,gl){const u=new Set();sec.groups.forEach(g=>g.stats.forEach(s=>{if(!hasRange(s))return;const fd=famDir(sec.name,g.name,s.stat);if(fd.fam===fam&&(fd.gl||"")===(gl||""))u.add(fd.dim);}));return [...u];}
  const clauses=[];
  Object.values(groups).forEach(G=>{const dt=dtFor(sec.name,G.fam);const dimStr=aggDims(G.dims,universe(G.fam,G.gl),dt);clauses.push({gl:G.gl,action:corr(G.fam,G.dir),dimStr});});
  // merge por (gl,dimStr)
  const merged={};
  clauses.forEach(c=>{const mk=(c.gl||"")+"||"+c.dimStr;if(!merged[mk])merged[mk]={gl:c.gl,dimStr:c.dimStr,acts:[]};if(!merged[mk].acts.includes(c.action))merged[mk].acts.push(c.action);});
  // agrupa por prefixo (gl) p/ não repetir a faixa/linha
  const byGl={};const glOrder=[];
  Object.values(merged).forEach(m=>{const glk=(m.gl&&m.gl!=="geral")?m.gl:"";const body=m.acts.join(" e ")+(m.dimStr?" "+m.dimStr:"");if(!byGl[glk]){byGl[glk]=[];glOrder.push(glk);}byGl[glk].push(body);});
  function joinBodies(arr){if(arr.length<=1)return arr.join("");return arr.slice(0,-1).join(", ")+" e "+arr[arr.length-1];}
  const sents=glOrder.map(glk=>{const bodies=byGl[glk];if(glk)return cap(glk)+": "+cap(joinBodies(bodies))+".";return "Precisa "+joinBodies(bodies)+".";});
  return sents.join(" ");
}

function classify(v,mn,mx){if(v==null)return "na";if(mn!=null&&v<mn)return "red";if(mx!=null&&v>mx)return "green";return "normal";}
function fmt(v){if(v==null)return "–";return (Math.round(v*100)/100);}
function faixaTxt(mn,mx){if(mn==null&&mx==null)return "sem faixa";if(mn!=null&&mx==null)return "≥ "+fmt(mn);if(mn==null&&mx!=null)return "≤ "+fmt(mx);return fmt(mn)+" – "+fmt(mx);}
function isBench(p){return !!BENCHSET[p];}
function valueFor(s,player){return s.vals?s.vals[player]:null;}
function hasRange(s){return s.min!=null||s.max!=null;}
function classFor(s,player){const v=valueFor(s,player);if(v==null)return "na";if(isBench(player)||!hasRange(s))return "neutral";return classify(v,s.min,s.max);}

}
let _curSecName="";
function cellTd(s,player,ctxLab){if(!s)return `<td class="mc empty"></td>`;const v=valueFor(s,player);const cls=classFor(s,player);const tip=` data-tip='${cellTip(s,player,ctxLab)}'`;if(v==null)return `<td class="mc na"${tip}>–</td>`;return `<td class="mc ${cls}"${tip}>${fmt(v)}</td>`;}
function normRow(row){return (typeof row==="object")?{l:row.l,k:row.k}:{l:row,k:row};}
function matrixHTML(cfg,map,player){let h=`<div class="tblcard"><h3>${cfg.title}</h3><div class="tbl-wrap"><table class="mtx"><thead><tr><th class="corner">${cfg.rowLabel||''}</th>`;cfg.cols.forEach(c=>h+=`<th>${(cfg.colPre||'')}${(cfg.colLbl&&cfg.colLbl[c])||c}</th>`);h+=`</tr></thead><tbody>`;
  cfg.rows.forEach(row=>{const rr=normRow(row);h+=`<tr><td class="rowh">${rr.l}</td>`;cfg.cols.forEach(c=>{const kk=cfg.key(rr.k,c);const s=kk?map[kk.group+"|||"+kk.stat]:null;if(s)s.__grp=kk.group;const ctxLab=(_curSecName==="RFI")?bucketLabel(kk?kk.group:""):"";h+=cellTd(s,player,ctxLab);});h+=`</tr>`;});h+=`</tbody></table></div></div>`;return h;}
function stripHTML(cfg,map,player){let h=`<div class="tblcard"><h3>${cfg.title}</h3><div class="tbl-wrap"><table class="strip"><thead><tr>`;cfg.stats.forEach(st=>h+=`<th>${st.stat}</th>`);h+=`</tr></thead><tbody><tr>`;cfg.stats.forEach(st=>{const s=map[st.group+"|||"+st.stat];if(s)s.__grp=st.group;h+=cellTd(s,player,"");});h+=`</tr></tbody></table></div></div>`;return h;}
function cleanLine(name){return name.replace(/\s*\([^)]*\)\s*/g," ").trim();}
function streetsHTML(sec,player){let h=`<div class="streets">`;sec.groups.forEach(g=>{const ranged=g.stats.filter(hasRange);if(!ranged.length)return;h+=`<div class="street"><h4>${g.name}</h4><table class="linetbl"><tbody>`;ranged.forEach(s=>{s.__grp=g.name;const lbl=cleanLine(s.stat);h+=`<tr><td class="ln" data-tip='<div class="tt">o que é</div><b>${whatis(lbl)}</b>'>${lbl}</td>${cellTd(s,player,"")}</tr>`;});h+=`</tbody></table></div>`;});h+=`</div>`;return h;}
function buildMap(sec){const m={};sec.groups.forEach(g=>g.stats.forEach(s=>{m[g.name+"|||"+s.stat]=s;}));return m;}

function renderSection(sec){
  let player=curPlayer,note="";
  if(player==="Todos"){player=MASTER.players.find(p=>p.kind==="benchmark").name;note=`Mostrando o benchmark <b style="color:var(--gold)">${player}</b>. Selecione um jogador à esquerda.`;}
  _curSecName=sec.name;
  const bench=isBench(player);const c=bench?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,player);
  const cnt=bench?`<span class="counts"><span class="t">${c.t} stats · benchmark</span></span>`:`<span class="counts"><span class="r">${c.r}<span class="arrow">▼</span></span><span class="g">${c.g}<span class="arrow">▲</span></span><span class="t">(${c.t})</span></span>`;
  let html=`<div class="secthead"><h1 class="secttitle">${labelFor(sec.name)} · <span class="pname">${player}</span></h1>${cnt}</div>`;
  html+=`<div class="legend"><span><i class="dot n"></i> OK</span><span><i class="dot r"></i> abaixo do mín.</span><span><i class="dot g"></i> acima do máx.</span><span style="color:var(--muted2)">passe o mouse na stat p/ ver nome, objetivo e atenção</span></div>`;
  if(note)html+=`<div class="hint">${note}</div>`;
  else if(!bench)html+=`<div class="diag"><h4>◆ Diagnóstico</h4>${sectionDiag(sec,player)}</div>`;
  const map=buildMap(sec);
  if(LAYOUTS[sec.name]){html+=`<div class="tblgrid">`;LAYOUTS[sec.name].forEach(cfg=>{html+=cfg.kind==="matrix"?matrixHTML(cfg,map,player):stripHTML(cfg,map,player);});html+=`</div>`;}
  else html+=streetsHTML(sec,player);
  const cont=document.getElementById("content");cont.innerHTML=html;bindTips(cont);
}
function tileHTML(label,desc,value,cls,rngTxt){return `<div class="tile"><div class="tv ${cls}">${value}</div><div class="tk">${label}</div><div class="td">${desc}</div>${rngTxt?`<div class="frng">${rngTxt}</div>`:''}</div>`;}
function profileTile(secName,groupName,statName,label,desc,player){const s=getStat(secName,groupName,statName);if(!s)return tileHTML(label,desc,"–","na","");const v=valueFor(s,player);const rng=hasRange(s)?("objetivo "+faixaTxt(s.min,s.max)):"";return tileHTML(label,desc,fmt(v),classFor(s,player),rng);}
function renderPlayerOverview(player){
  const ex=profMeta(player);const bench=isBench(player);_curSecName="";
  let html=`<div class="secthead"><h1 class="secttitle">Perfil · <span class="pname">${player}</span></h1></div>`;
  html+=`<div class="pfhead">Sample: <b style="color:var(--gold)">${ex.label||'—'}</b>. Stats com faixa ficam <span style="color:var(--red)">vermelhas</span> abaixo do mínimo e <span style="color:var(--green)">verdes</span> acima do máximo.</div>`;
  html+=`<div class="pfgroup"><div class="glbl">Geral</div><div class="tiles">`;
  html+=tileHTML("Mãos","total de mãos jogadas",ex.hands,"neutral","");
  html+=profileTile("Preflop","Pós-flop (geral)","WWSF","WWSF","ganhou quando viu o flop (%)",player);
  html+=tileHTML("Won s/ Showdown","bb/100 ganho sem showdown",(ex.wonNoSD==null?"–":ex.wonNoSD),"neutral","");
  html+=tileHTML("Win Rate EV","bb/100 (ajustado por EV)",(ex.winrate==null?"–":ex.winrate),"neutral","");
  html+=`</div></div><div class="pfgroup"><div class="glbl">Preflop</div><div class="tiles">`;
  ["VPIP","PFR","3BET","F3BET"].forEach((st,i)=>{const desc=["% que entra no pote","% que aumenta preflop","% de 3-bet","% que folda pro 3-bet"][i];html+=profileTile("Preflop","GERAL (topo do print)",st,st,desc,player);});
  html+=`</div></div>`;
  html+=`<div class="smtitle">Seções — clique para abrir os leaks de ${player}</div><div class="secmenu">`;
  DATA.sections.forEach(sec=>{const c=bench?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,player);const inner=(!c.r&&!c.g)?`<span class="ok">OK</span> <span class="tt">(${c.t})</span>`:`<span class="r">${c.r}<span class="arrow">▼</span></span><span class="g">${c.g}<span class="arrow">▲</span></span><span class="tt">(${c.t})</span>`;html+=`<div class="seccard" data-sec="${sec.name}"><div class="st">${labelFor(sec.name)}</div><div class="sc">${inner}</div></div>`;});
  html+=`</div>`;const cont=document.getElementById("content");cont.innerHTML=html;bindTips(cont);cont.querySelectorAll(".seccard").forEach(el=>el.onclick=()=>{curSection=el.dataset.sec;render();});
}
function renderHeatmap(){_curSecName="";let totR=0,totG=0;DATA.sections.forEach(sec=>PLAYERS.forEach(p=>{const c=countSec(sec,p);totR+=c.r;totG+=c.g;}));
  let html=`<div class="secthead"><h1 class="secttitle">Visão Geral</h1></div><div class="pfhead">Quantas stats de cada jogador estão fora da faixa, por seção. Clique numa célula para abrir a seção do jogador.</div>`;
  html+=`<div class="kpis"><div class="kpi"><div class="k">Jogadores</div><div class="v gold">${PLAYERS.length}</div></div><div class="kpi"><div class="k">Seções</div><div class="v gold">${DATA.sections.length}</div></div><div class="kpi"><div class="k">Abaixo do mínimo</div><div class="v red">${totR}</div></div><div class="kpi"><div class="k">Acima do máximo</div><div class="v green">${totG}</div></div></div>`;
  html+=`<div class="legend"><span><i class="dot r"></i> stat abaixo do mín.</span><span><i class="dot g"></i> stat acima do máx.</span></div>`;
  html+=`<div class="ovwrap"><table class="heat"><thead><tr><th class="pl"></th>`;DATA.sections.forEach(sec=>html+=`<th>${labelFor(sec.name).replace(' ','<br>')}</th>`);html+=`</tr></thead><tbody>`;
  PLAYERS.forEach(p=>{html+=`<tr><td class="pl" data-p="${p}">${p}</td>`;DATA.sections.forEach(sec=>{const c=countSec(sec,p);const clean=(c.r+c.g)===0;if(clean)html+=`<td><div class="cell clean" data-sec="${sec.name}" data-p="${p}"><span class="okbig">OK</span></div></td>`;else html+=`<td><div class="cell" data-sec="${sec.name}" data-p="${p}"><div class="rr">${c.r}<span class="arrow">▼</span></div><div class="gg">${c.g}<span class="arrow">▲</span></div></div></td>`;});html+=`</tr>`;});
  html+=`</tbody></table></div>`;const cont=document.getElementById("content");cont.innerHTML=html;
  cont.querySelectorAll(".cell").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection=el.dataset.sec;render();});
  cont.querySelectorAll(".pl").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection="__overview__";render();});
}
function renderOverview(){if(curPlayer==="Todos")renderHeatmap();else renderPlayerOverview(curPlayer);}
function render(){renderSelectors();renderNav();if(curSection==="__overview__")renderOverview();else{const sec=DATA.sections.find(s=>s.name===curSection);if(sec)renderSection(sec);else renderOverview();}window.scrollTo(0,0);}

function initMaster(){PMAP={};BENCHSET={};PLAYERS=[];MASTER.players.forEach(p=>{PMAP[p.name]=p;curSample[p.name]=0;if(p.kind==="benchmark")BENCHSET[p.name]=1;else PLAYERS.push(p.name);});rebuildData();}
function enterApp(res){
  MASTER={sections:ENC.public.sections,players:res.players.concat(ENC.public.benchmarks)};
  ADMIN=res.admin;initMaster();
  curPlayer=ADMIN?"Todos":res.players[0].name;curSection="__overview__";
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("themeBtn").style.display="flex";
  render();
}
async function tryLogin(){
  const u=document.getElementById("luser").value, pw=document.getElementById("lpass").value;
  const err=document.getElementById("lerr");err.textContent="";
  if(!pw){err.textContent="Digite a senha.";return;}
  try{const res=await login(u,pw);try{sessionStorage.setItem("gpt-auth",JSON.stringify({u,pw}));}catch(e){}enterApp(res);}
  catch(e){err.textContent="Usuário ou senha incorretos.";}
}
async function boot(){
  if(window.__ENC__){ENC=window.__ENC__;}
  else{try{const r=await fetch("players.enc.json",{cache:"no-store"});if(r.ok)ENC=await r.json();}catch(e){}}
  if(!ENC){document.getElementById("lerr").textContent="Falha ao carregar dados.";return;}
  const sel=document.getElementById("luser");
  sel.innerHTML=`<option value="__admin__">Nico (admin)</option>`+ENC.players.map(p=>`<option value="${p.name}">${p.name}</option>`).join("");
  document.getElementById("lbtn").onclick=tryLogin;
  document.getElementById("lpass").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
  // auto-login
  let saved=null;try{saved=JSON.parse(sessionStorage.getItem("gpt-auth"));}catch(e){}
  if(saved&&saved.pw){try{enterApp(await login(saved.u,saved.pw));}catch(e){}}
}
boot();
</script>
