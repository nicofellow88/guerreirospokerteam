<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guerreiros Poker Team — Leak Finder</title>
<style>
:root{
  --bg:#0e1013; --panel:#16191f; --panel2:#1d222b; --panel3:#242b36;
  --border:#2b3340; --text:#eef1f6; --muted:#95a0af; --muted2:#68727f;
  --gold:#f5b81f; --gold-deep:#c98f0f; --gold-dim:#3a2c07; --gold-soft:#221a06;
  --red:#f0616d; --red-bg:#341419; --green:#43c98a; --green-bg:#123024;
  --shadow:0 10px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
.sidebar{width:262px;flex:0 0 262px;background:linear-gradient(180deg,#161a21,#0e1013);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;padding:0 0 24px}
.brand{padding:20px 16px 16px;border-bottom:1px solid var(--border);text-align:center}
.brand .logo{display:flex;flex-direction:column;align-items:center;gap:10px}
.brand .badge-logo{width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.brand .badge-logo img{width:120px;height:120px;object-fit:contain;display:block;filter:drop-shadow(0 4px 14px rgba(0,0,0,.5))}
.brand h1{font-size:15.5px;margin:0;letter-spacing:.3px;line-height:1.25;font-weight:800}
.brand .sub{color:var(--gold);font-size:10.5px;margin-top:3px;letter-spacing:.6px;text-transform:uppercase;font-weight:700}
.selwrap{padding:14px 16px 4px}
.sellbl{color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:7px}
.samps{margin-top:10px}
.schip{display:inline-block;padding:6px 11px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-size:11.5px;font-weight:700;cursor:pointer;margin:0 5px 5px 0}
.schip:hover{border-color:var(--gold-deep);color:var(--text)}
.schip.active{background:var(--gold);border-color:var(--gold);color:#231602}
.navlabel{color:var(--muted2);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;padding:14px 20px 6px}
.navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 18px 10px 20px;cursor:pointer;color:var(--muted);border-left:3px solid transparent;font-size:14px;transition:.12s}
.navitem:hover{background:var(--panel);color:var(--text)}
.navitem.active{background:linear-gradient(90deg,var(--gold-dim),transparent);color:#fff;border-left-color:var(--gold);font-weight:600}
.navitem .nm{display:flex;align-items:center;gap:9px;min-width:0}
.navitem .num{color:var(--muted2);font-size:12px;width:16px;text-align:right;flex:0 0 auto}
.navitem.active .num{color:var(--gold)}
.navitem .badge{font-size:12px;color:var(--muted2);white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:700}
.badge .r{color:var(--red)} .badge .g{color:var(--green)} .badge .t{color:var(--muted2);font-weight:600}
.navitem .ok{color:var(--gold);font-weight:800;font-size:12px}
.pdrop{position:relative}
.pdrop-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border-radius:10px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:15px;font-weight:700}
.pdrop-btn:hover{border-color:var(--gold-deep)}
.pdrop-btn .cur{flex:1;text-align:left}
.pdrop-btn .cur.bench{color:var(--gold)}
.pdrop-btn .cv{color:var(--muted2);font-size:12px;transition:.15s}
.pdrop.open .pdrop-btn{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,184,31,.15)}
.pdrop.open .cv{transform:rotate(180deg)}
.pdrop-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;max-height:60vh;overflow-y:auto;background:#12151b;border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);padding:6px;display:none;z-index:40}
.pdrop.open .pdrop-menu{display:block}
.pdrop-opt{display:flex;align-items:center;padding:10px 13px;border-radius:8px;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--muted)}
.pdrop-opt:hover{background:var(--panel2);color:var(--text)}
.pdrop-opt.active{background:linear-gradient(90deg,var(--gold),var(--gold-deep));color:#231602}
.pdrop-opt.bench{color:var(--gold)} .pdrop-opt.bench.active{color:#231602}
.pdrop-sep{height:1px;background:var(--border);margin:5px 8px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.content{padding:28px 32px 80px;max-width:1620px}
.legend{display:flex;gap:20px;align-items:center;color:var(--muted);font-size:13px;margin:2px 0 20px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:8px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
.dot.n{background:#c9d4e0} .dot.r{background:var(--red)} .dot.g{background:var(--green)}
.diag{background:linear-gradient(100deg,var(--gold-soft),var(--panel) 70%);border:1px solid var(--gold-deep);border-left:4px solid var(--gold);border-radius:14px;padding:18px 22px;margin:4px 0 24px;line-height:1.6;font-size:14.5px}
.diag h4{margin:0 0 9px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.7px;text-transform:uppercase}
.diag b{color:#fff}
.diag.mini{padding:14px 18px;font-size:14px;margin:0 0 20px}
.secthead{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin:0 0 6px}
.secttitle{font-size:32px;font-weight:800;margin:0;letter-spacing:.2px}
.secttitle .pname{color:var(--gold)}
.counts{display:inline-flex;gap:16px;font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
.counts .r{color:var(--red)} .counts .g{color:var(--green)} .counts .t{color:var(--muted2);font-weight:700}
.arrow{font-size:.82em;vertical-align:middle}
.tblgrid{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
.tblcard{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px 18px;margin-bottom:20px;box-shadow:var(--shadow);display:inline-block;vertical-align:top}
.tblcard h3{margin:0 0 14px;font-size:14px;font-weight:800;color:var(--gold);letter-spacing:.4px;text-transform:uppercase;text-align:center}
.tbl-wrap{overflow-x:auto}
table.mtx,table.strip,table.linetbl{border-collapse:separate;border-spacing:5px;font-variant-numeric:tabular-nums}
.mtx th,.strip th{color:var(--muted2);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px;padding:5px 10px;text-align:center;white-space:nowrap}
.mtx td.corner{color:var(--muted2);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px;text-align:left;padding:5px 12px 5px 6px}
.mtx td.rowh{color:var(--text);font-weight:700;font-size:14px;text-align:left;padding:8px 12px 8px 6px;white-space:nowrap}
.mc{min-width:64px;text-align:center;padding:10px 13px;border-radius:9px;background:var(--panel2);font-weight:700;font-size:16px;transition:.1s}
.mc.empty{background:transparent}
.mc.na{color:var(--muted2);font-weight:400;background:var(--panel2)}
.mc.neutral,.mc.normal{color:#eef4fb}
.mc.red{color:var(--red);background:var(--red-bg)}
.mc.green{color:var(--green);background:var(--green-bg)}
.mc[data-tip]{cursor:help}
.mc[data-tip]:hover{outline:2px solid var(--gold);outline-offset:-2px}
.strip .mc{min-width:70px}
.linetbl td.ln{color:var(--text);font-size:13.5px;text-align:left;padding:7px 12px 7px 4px;white-space:nowrap;font-weight:600;cursor:help}
.linetbl td.ln:hover{color:var(--gold)}
.linetbl .mc{min-width:74px}
.streets{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
.street{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px 16px;box-shadow:var(--shadow);min-width:240px}
.street h4{margin:0 0 10px;font-size:13px;font-weight:800;color:var(--gold);letter-spacing:.5px}
#tip{position:fixed;z-index:60;background:#0b0e13;border:1px solid var(--gold-deep);border-radius:9px;padding:9px 12px;font-size:13px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.55);pointer-events:none;opacity:0;transition:opacity .1s;max-width:300px}
#tip .tt{color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.3px}
#tip b{color:var(--gold)}
.pfhead{font-size:14px;color:var(--muted);margin:0 0 14px}
.pfgroup .glbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);font-weight:800;margin:16px 0 10px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center}
.tile .tv{font-size:36px;font-weight:800;line-height:1}
.tile .tv.red{color:var(--red)} .tile .tv.green{color:var(--green)} .tile .tv.neutral,.tile .tv.normal{color:#eef4fb}
.tile .tk{font-size:15px;font-weight:800;margin-top:10px;color:var(--text)}
.tile .td{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.3}
.tile .frng{font-size:11.5px;color:var(--muted2);margin-top:7px;font-variant-numeric:tabular-nums}
.smtitle{font-size:15px;color:var(--muted);margin:26px 0 12px;font-weight:700}
.secmenu{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.seccard{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 16px;cursor:pointer;transition:.12s;text-align:center}
.seccard:hover{border-color:var(--gold);transform:translateY(-1px)}
.seccard .st{font-size:17px;font-weight:800;margin:0 0 12px}
.seccard .sc{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;gap:14px;align-items:center;justify-content:center}
.seccard .sc .r{color:var(--red)} .seccard .sc .g{color:var(--green)}
.seccard .sc .ok{color:var(--gold)} .seccard .sc .tt{color:var(--muted2);font-size:14px;font-weight:600}
.kpis{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 22px;min-width:160px;text-align:center}
.kpi .k{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:34px;font-weight:800;margin-top:5px}
.kpi .v.gold{color:var(--gold)} .kpi .v.red{color:var(--red)} .kpi .v.green{color:var(--green)}
.ovwrap{overflow-x:auto}
.heat{border-collapse:separate;border-spacing:8px;min-width:960px}
.heat th{font-size:12px;color:var(--muted);text-align:center;padding:4px 6px;font-weight:700}
.heat td.pl{text-align:left;font-weight:800;color:var(--text);padding-right:14px;cursor:pointer;font-size:15px}
.heat td.pl:hover{color:var(--gold)}
.cell{min-width:92px;border-radius:11px;background:var(--panel2);border:1px solid var(--border);padding:12px 10px;text-align:center;cursor:pointer;transition:.12s;line-height:1.3}
.cell:hover{border-color:var(--gold);transform:translateY(-1px)}
.cell .rr{color:var(--red);font-weight:800;font-size:21px} .cell .gg{color:var(--green);font-weight:800;font-size:21px}
.cell.clean{display:flex;align-items:center;justify-content:center;min-height:76px}
.cell .okbig{color:var(--gold);font-weight:800;font-size:25px;letter-spacing:.5px}
.ovnote{color:var(--muted);font-size:13px;margin:18px 0 6px}
.hint{color:var(--muted2);font-size:13px;margin:10px 0}
.loader{padding:60px;text-align:center;color:var(--muted)}
/* comparação */
.cmpbar{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-end;margin:6px 0 20px}
.cmpsel{display:flex;flex-direction:column;gap:6px}
.cmpsel .cl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--muted2)}
.cmpsel .cl.a{color:var(--muted)} .cmpsel .cl.b{color:var(--gold)}
.cmptiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
.ctile{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:15px 16px;text-align:center}
.ctile .ck{font-size:12.5px;font-weight:800;color:var(--text)}
.ctile .cvs{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;font-variant-numeric:tabular-nums}
.ctile .a{font-size:22px;font-weight:800;color:var(--muted)}
.ctile .ar{color:var(--muted2);font-size:16px}
.ctile .b{font-size:26px;font-weight:800}
.ctile .st{margin-top:6px;font-size:11.5px;font-weight:700}
.up{color:var(--green)} .down{color:var(--red)} .eqc{color:var(--muted2)}
.cmpcols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:8px 0 22px}
.cmpcol h4{margin:0 0 10px;font-size:12px;letter-spacing:.5px;text-transform:uppercase;font-weight:800}
.cmpcol.up h4{color:var(--green)} .cmpcol.down h4{color:var(--red)}
.cmprow{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;font-size:13px}
.cmprow .nmn{flex:1;font-weight:600}
.cmprow .vv{font-variant-numeric:tabular-nums;font-weight:800;color:var(--muted)}
.cmprow .vv b{color:var(--text)}
.cmpsec{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 18px 8px;margin-bottom:14px}
.cmpsec h3{margin:0 0 10px;font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:.4px;font-weight:800}
.cmptbl{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
.cmptbl th{font-size:10.5px;text-transform:uppercase;color:var(--muted2);text-align:right;padding:5px 12px;font-weight:700}
.cmptbl th:first-child{text-align:left}
.cmptbl td{padding:7px 12px;text-align:right;border-top:1px solid #1e2530;font-size:13.5px}
.cmptbl td:first-child{text-align:left;font-weight:600}
.cmptbl td.va{color:var(--muted);font-weight:700} .cmptbl td.vb{font-weight:800}
.stpill{display:inline-block;min-width:64px;text-align:center;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:800}
.stpill.up{background:var(--green-bg)} .stpill.down{background:var(--red-bg)} .stpill.eqc{background:#20262f}
@media(max-width:1000px){.tiles,.secmenu,.cmptiles{grid-template-columns:repeat(2,1fr)}.cmpcols{grid-template-columns:1fr}}
@media(max-width:820px){.sidebar{position:static;width:100%;height:auto}.app{flex-direction:column}.content{padding:16px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo"><div class="badge-logo" id="logoBox"></div>
      <div><h1>Guerreiros Poker Team</h1><div class="sub">Mentoria · Leak Finder</div></div></div></div>
    <div class="selwrap">
      <div class="sellbl">Jogador</div>
      <div class="pdrop" id="pdrop"><button class="pdrop-btn" id="pdropBtn"><span class="cur" id="pdropCur">Todos</span><span class="cv">▾</span></button><div class="pdrop-menu" id="pdropMenu"></div></div>
      <div class="samps" id="sampWrap"></div>
    </div>
    <div class="navlabel">Painel</div>
    <div id="nav"></div>
  </aside>
  <div class="main"><div class="content" id="content"><div class="loader">Carregando…</div></div></div>
</div>
<div id="tip"></div>

const FAM={"VPIP":"VPIP — % que entra no pote","PFR":"PFR — % que aumenta preflop","3BET":"3-Bet — % de 3-bet","F3BET":"Fold to 3-Bet — % que folda pro 3-bet","SQZ":"Squeeze — 3-bet sobre open + call","4BET":"4-Bet — % de 4-bet","F4BET":"Fold to 4-Bet","RFI":"Raise First In — abre de raise","FLAT":"Flat / Cold-call — paga a abertura","WR":"Win Rate (bb/100)","WWSF":"Won When Saw Flop — ganhou quando viu o flop","WSD":"Went to Showdown — foi a showdown","W$SD":"Won $ at Showdown — ganhou no showdown","SHOVE":"Shove — all-in de abertura","CALL":"Call — pagar","FOLD":"Fold — desistir","LIMP/CALL":"Limp/Call — paga a BB e paga o raise","LIMP/FOLD":"Limp/Fold — paga a BB e folda o raise","LIMP/RAISE":"Limp/Raise — paga a BB e re-aumenta","R VS L":"Raise vs Limp","X VS L":"Check vs Limp","3B NAI":"3-Bet No All-In","3B AI":"3-Bet All-In","3B":"3-Bet"};
const POS={"BB":"Big Blind","SB":"Small Blind","BTN":"Button","CO":"Cutoff","MP":"Middle Position","EP":"Early Position","UTG":"Under the Gun","LJ":"Lojack","HJ":"Hijack","TOTAL":"Total","UTG #1":"UTG #1","UTG #2":"UTG #2","UTG #3":"UTG #3"};
const POST={"B":"Bet","X":"Check","C":"Call","F":"Fold","R":"Raise","D":"Donk (lead OOP)","Bs":"Bet small","Bb":"Bet big","Fs":"Fold vs small bet","Fb":"Fold vs big bet","Fov":"Fold vs overbet","Cs":"Call small","Rs":"Raise vs small bet","BsF":"Bet small e Fold","BbF":"Bet big e Fold","XFs":"Check-Fold vs small bet","XFb":"Check-Fold vs big bet","XCs":"Check-Call small","XRs":"Check-Raise vs small bet","XF":"Check-Fold","XC":"Check-Call","XR":"Check-Raise","XB":"Check e Bet"};
function posL(p){p=(""+p).trim();return POS[p]||p;}
function faixaLbl(f){f=(""+f).trim();if(f.indexOf("[")>=0)return f.replace(/[\[\]]/g,"").replace(";"," – ")+" bb";return f+" bb";}
function decode(st){st=(""+st).trim();
  if(st.indexOf("|")>=0)return st.split("|").map(t=>POST[t.trim()]||t.trim()).join(" → ");
  let m=st.match(/^3BET-RS (.+) vs (.+) \((AI|NAI)\)$/);if(m)return "Resteal "+(m[3]==="AI"?"all-in":"no all-in")+" · "+m[1]+" (herói) vs "+m[2]+" (abriu)";
  m=st.match(/^F3BET (.+) \((IP|OOP)\)$/);if(m)return "Fold to 3-Bet · "+posL(m[1])+" · "+(m[2]==="IP"?"em posição":"fora de posição");
  m=st.match(/^3BET (.+) vs (.+)$/);if(m)return "3-Bet · "+m[1]+" (herói) vs "+m[2]+" (abriu)";
  if(st.indexOf(" · ")>=0){const a=st.split(" · ");return posL(a[0])+" · "+(FAM[a[1]]||a[1]);}
  m=st.match(/^(VPIP|PFR) (\[.+\]|>.+)$/);if(m)return (FAM[m[1]]||m[1])+" · faixa "+faixaLbl(m[2]);
  m=st.match(/^(VPIP|PFR|RFI|3BET|FLAT|F3BET|WR) (.+)$/);if(m)return (FAM[m[1]]||m[1])+" · "+posL(m[2]);
  if(FAM[st])return FAM[st];return st;}

/* cor */
function classify(v,mn,mx){if(v==null)return "na";if(mn!=null&&v<mn)return "red";if(mx!=null&&v>mx)return "green";return "normal";}
function fmt(v){if(v==null)return "–";return (Math.round(v*100)/100);}
function faixaTxt(mn,mx){if(mn==null&&mx==null)return "sem faixa";if(mn!=null&&mx==null)return "≥ "+fmt(mn);if(mn==null&&mx!=null)return "≤ "+fmt(mx);return fmt(mn)+" – "+fmt(mx);}
function isBench(p){return !!BENCHSET[p];}
function valueFor(s,player){return s.vals?s.vals[player]:null;}
function hasRange(s){return s.min!=null||s.max!=null;}
function classFor(s,player){const v=valueFor(s,player);if(v==null)return "na";if(isBench(player)||!hasRange(s))return "neutral";return classify(v,s.min,s.max);}
function sectionRanged(sec){let n=0;sec.groups.forEach(g=>g.stats.forEach(s=>{if(hasRange(s))n++;}));return n;}
function countSec(sec,player){let r=0,g=0;const ps=player==="Todos"?PLAYERS:[player];
  sec.groups.forEach(gr=>gr.stats.forEach(s=>{if(!hasRange(s))return;ps.forEach(p=>{const c=classify(s.vals[p],s.min,s.max);if(c==="red")r++;else if(c==="green")g++;});}));
  return {r,g,t:sectionRanged(sec)*ps.length};}
function getStat(secName,groupName,statName){const sec=DATA.sections.find(s=>s.name===secName);if(!sec)return null;const g=sec.groups.find(g=>g.name===groupName);if(!g)return null;return g.stats.find(s=>s.stat===statName)||null;}

/* ===== construir DATA a partir das samples selecionadas ===== */
function sampleOf(name){const p=PMAP[name];if(!p)return null;return p.samples[curSample[name]||0];}
function rebuildData(){
  DATA={meta:{},sections:MASTER.sections.map(sec=>({name:sec.name,groups:sec.groups.map(g=>({name:g.name,stats:g.stats.map(s=>({stat:s.stat,reg:s.reg,min:s.min,max:s.max,vals:{}}))}))}))};
  MASTER.players.forEach(p=>{const smp=p.samples[curSample[p.name]||0];
    DATA.sections.forEach(sec=>sec.groups.forEach(g=>g.stats.forEach(s=>{s.vals[p.name]=smp.vals[sec.name+"|||"+g.name+"|||"+s.stat];})));});
}
function profMeta(player){const smp=sampleOf(player);return smp||{hands:"–",winrate:null,wonNoSD:null};}

/* tooltip */
const tipEl=document.getElementById("tip");
function bindTips(root){root.querySelectorAll("[data-tip]").forEach(el=>{
  el.addEventListener("mousemove",e=>{tipEl.innerHTML=el.getAttribute("data-tip");tipEl.style.opacity="1";
    let x=e.clientX+14,y=e.clientY+16;const w=tipEl.offsetWidth,h=tipEl.offsetHeight;
    if(x+w>window.innerWidth-8)x=e.clientX-w-14;if(y+h>window.innerHeight-8)y=e.clientY-h-16;
    tipEl.style.left=x+"px";tipEl.style.top=y+"px";});
  el.addEventListener("mouseleave",()=>{tipEl.style.opacity="0";});});}

/* células */
function cellTip(s){return `<div class="tt">o que é</div><b>${decode(s.stat)}</b><div class="tt" style="margin-top:6px">alvo (faixa)</div>${faixaTxt(s.min,s.max)} <span style="color:var(--muted2)">· reg ${fmt(s.reg)}</span>`;}
function cellTd(s,player){if(!s)return `<td class="mc empty"></td>`;const v=valueFor(s,player);const cls=classFor(s,player);const tip=` data-tip='${cellTip(s)}'`;if(v==null)return `<td class="mc na"${tip}>–</td>`;return `<td class="mc ${cls}"${tip}>${fmt(v)}</td>`;}
function normRow(row){return (typeof row==="object")?{l:row.l,k:row.k}:{l:row,k:row};}
function matrixHTML(cfg,map,player){let h=`<div class="tblcard"><h3>${cfg.title}</h3><div class="tbl-wrap"><table class="mtx"><thead><tr><th class="corner">${cfg.rowLabel||''}</th>`;
  cfg.cols.forEach(c=>h+=`<th>${(cfg.colPre||'')}${(cfg.colLbl&&cfg.colLbl[c])||c}</th>`);h+=`</tr></thead><tbody>`;
  cfg.rows.forEach(row=>{const rr=normRow(row);h+=`<tr><td class="rowh">${rr.l}</td>`;cfg.cols.forEach(c=>{const kk=cfg.key(rr.k,c);const s=kk?map[kk.group+"|||"+kk.stat]:null;h+=cellTd(s,player);});h+=`</tr>`;});
  h+=`</tbody></table></div></div>`;return h;}
function stripHTML(cfg,map,player){let h=`<div class="tblcard"><h3>${cfg.title}</h3><div class="tbl-wrap"><table class="strip"><thead><tr>`;cfg.stats.forEach(st=>h+=`<th>${st.stat}</th>`);h+=`</tr></thead><tbody><tr>`;cfg.stats.forEach(st=>{const s=map[st.group+"|||"+st.stat];h+=cellTd(s,player);});h+=`</tr></tbody></table></div></div>`;return h;}
function cleanLine(name){return name.replace(/\s*\([^)]*\)\s*/g," ").trim();}
function streetsHTML(sec,player){let h=`<div class="streets">`;sec.groups.forEach(g=>{const ranged=g.stats.filter(hasRange);if(!ranged.length)return;h+=`<div class="street"><h4>${g.name}</h4><table class="linetbl"><tbody>`;ranged.forEach(s=>{const lbl=cleanLine(s.stat);h+=`<tr><td class="ln" data-tip='<div class="tt">o que é</div><b>${decode(lbl)}</b>'>${lbl}</td>${cellTd(s,player)}</tr>`;});h+=`</tbody></table></div>`;});h+=`</div>`;return h;}
function buildMap(sec){const m={};sec.groups.forEach(g=>g.stats.forEach(s=>{m[g.name+"|||"+s.stat]=s;}));return m;}

/* diagnóstico */
function diagOverall(player){const d=DIAG[player];if(!d||!d.overall)return "";return `<div class="diag"><h4>◆ Diagnóstico — ${player}</h4>${d.overall}</div>`;}
function diagSection(player,secName){const d=DIAG[player];if(!d||!d[secName])return "";return `<div class="diag mini"><h4>◆ Diagnóstico</h4>${d[secName]}</div>`;}

function renderSection(sec){
  let player=curPlayer,note="";
  if(player==="Todos"){player=MASTER.players.find(p=>p.kind==="benchmark").name;note=`Mostrando o benchmark <b style="color:var(--gold)">${player}</b>. Selecione um jogador no menu à esquerda.`;}
  const bench=isBench(player);
  const c=bench?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,player);
  const cnt=bench?`<span class="counts"><span class="t">${c.t} stats · benchmark</span></span>`:`<span class="counts"><span class="r">${c.r}<span class="arrow">▼</span></span><span class="g">${c.g}<span class="arrow">▲</span></span><span class="t">(${c.t})</span></span>`;
  let html=`<div class="secthead"><h1 class="secttitle">${labelFor(sec.name)} · <span class="pname">${player}</span></h1>${cnt}</div>`;
  html+=`<div class="legend"><span><i class="dot n"></i> OK</span><span><i class="dot r"></i> abaixo do mín.</span><span><i class="dot g"></i> acima do máx.</span><span style="color:var(--muted2)">passe o mouse na stat p/ ver o nome e a faixa</span></div>`;
  if(note)html+=`<div class="hint">${note}</div>`;else if(!bench)html+=diagSection(player,sec.name);
  const map=buildMap(sec);
  if(LAYOUTS[sec.name]){html+=`<div class="tblgrid">`;LAYOUTS[sec.name].forEach(cfg=>{html+=cfg.kind==="matrix"?matrixHTML(cfg,map,player):stripHTML(cfg,map,player);});html+=`</div>`;}
  else html+=streetsHTML(sec,player);
  const cont=document.getElementById("content");cont.innerHTML=html;bindTips(cont);
}

/* overview */
function tileHTML(label,desc,value,cls,rngTxt){return `<div class="tile"><div class="tv ${cls}">${value}</div><div class="tk">${label}</div><div class="td">${desc}</div>${rngTxt?`<div class="frng">${rngTxt}</div>`:''}</div>`;}
function profileTile(secName,groupName,statName,label,desc,player){const s=getStat(secName,groupName,statName);if(!s)return tileHTML(label,desc,"–","na","");const v=valueFor(s,player);const rng=hasRange(s)?("alvo "+faixaTxt(s.min,s.max)):"";return tileHTML(label,desc,fmt(v),classFor(s,player),rng);}
function renderPlayerOverview(player){
  const ex=profMeta(player);const bench=isBench(player);
  let html=`<div class="secthead"><h1 class="secttitle">Perfil · <span class="pname">${player}</span></h1></div>`;
  if(!bench)html+=diagOverall(player);
  html+=`<div class="pfhead">Sample: <b style="color:var(--gold)">${ex.label||'—'}</b>. Stats com faixa ficam <span style="color:var(--red)">vermelhas</span> abaixo do mínimo e <span style="color:var(--green)">verdes</span> acima do máximo.</div>`;
  html+=`<div class="pfgroup"><div class="glbl">Geral</div><div class="tiles">`;
  html+=tileHTML("Mãos","total de mãos jogadas",ex.hands,"neutral","");
  html+=profileTile("Preflop","Pós-flop (geral)","WWSF","WWSF","ganhou quando viu o flop (%)",player);
  html+=tileHTML("Won s/ Showdown","bb/100 ganho sem showdown",(ex.wonNoSD==null?"–":ex.wonNoSD),"neutral","");
  html+=tileHTML("Win Rate EV","bb/100 (ajustado por EV)",(ex.winrate==null?"–":ex.winrate),"neutral","");
  html+=`</div></div>`;
  html+=`<div class="pfgroup"><div class="glbl">Preflop</div><div class="tiles">`;
  ["VPIP","PFR","3BET","F3BET"].forEach((st,i)=>{const desc=["% que entra no pote","% que aumenta preflop","% de 3-bet","% que folda pro 3-bet"][i];html+=profileTile("Preflop","GERAL (topo do print)",st,st,desc,player);});
  html+=`</div></div>`;
  html+=`<div class="smtitle">Seções — clique para abrir os leaks de ${player}</div><div class="secmenu">`;
  DATA.sections.forEach(sec=>{const c=bench?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,player);const inner=(!c.r&&!c.g)?`<span class="ok">OK</span> <span class="tt">(${c.t})</span>`:`<span class="r">${c.r}<span class="arrow">▼</span></span><span class="g">${c.g}<span class="arrow">▲</span></span><span class="tt">(${c.t})</span>`;html+=`<div class="seccard" data-sec="${sec.name}"><div class="st">${labelFor(sec.name)}</div><div class="sc">${inner}</div></div>`;});
  html+=`</div>`;
  const cont=document.getElementById("content");cont.innerHTML=html;bindTips(cont);
  cont.querySelectorAll(".seccard").forEach(el=>el.onclick=()=>{curSection=el.dataset.sec;render();});

function renderHeatmap(){
  let totR=0,totG=0;DATA.sections.forEach(sec=>PLAYERS.forEach(p=>{const c=countSec(sec,p);totR+=c.r;totG+=c.g;}));
  let html=`<div class="secthead"><h1 class="secttitle">Visão Geral</h1></div><div class="pfhead">Quantas stats de cada jogador estão fora da faixa, por seção. Clique numa célula para abrir a seção do jogador.</div>`;
  html+=`<div class="kpis"><div class="kpi"><div class="k">Jogadores</div><div class="v gold">${PLAYERS.length}</div></div><div class="kpi"><div class="k">Seções</div><div class="v gold">${DATA.sections.length}</div></div><div class="kpi"><div class="k">Abaixo do mínimo</div><div class="v red">${totR}</div></div><div class="kpi"><div class="k">Acima do máximo</div><div class="v green">${totG}</div></div></div>`;
  html+=`<div class="legend"><span><i class="dot r"></i> stat abaixo do mín.</span><span><i class="dot g"></i> stat acima do máx.</span></div>`;
  html+=`<div class="ovwrap"><table class="heat"><thead><tr><th class="pl"></th>`;DATA.sections.forEach(sec=>html+=`<th>${labelFor(sec.name).replace(' ','<br>')}</th>`);html+=`</tr></thead><tbody>`;
  PLAYERS.forEach(p=>{html+=`<tr><td class="pl" data-p="${p}">${p}</td>`;DATA.sections.forEach(sec=>{const c=countSec(sec,p);const clean=(c.r+c.g)===0;if(clean)html+=`<td><div class="cell clean" data-sec="${sec.name}" data-p="${p}"><span class="okbig">OK</span></div></td>`;else html+=`<td><div class="cell" data-sec="${sec.name}" data-p="${p}"><div class="rr">${c.r}<span class="arrow">▼</span></div><div class="gg">${c.g}<span class="arrow">▲</span></div></div></td>`;});html+=`</tr>`;});
  html+=`</tbody></table></div><div class="ovnote">Legenda: <span style="color:var(--red)">vermelho ▼</span> = abaixo do mínimo · <span style="color:var(--green)">verde ▲</span> = acima do máximo · <span style="color:var(--gold)">OK</span> = tudo dentro da faixa.</div>`;
  const cont=document.getElementById("content");cont.innerHTML=html;
  cont.querySelectorAll(".cell").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection=el.dataset.sec;render();});
  cont.querySelectorAll(".pl").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection="__overview__";render();});
}
function renderOverview(){if(curPlayer==="Todos")renderHeatmap();else renderPlayerOverview(curPlayer);}

/* ===== comparação ===== */
function distOut(v,mn,mx){if(v==null)return null;if(mn!=null&&v<mn)return mn-v;if(mx!=null&&v>mx)return v-mx;return 0;}
function cmpStatus(v1,v2,mn,mx){if(v1==null||v2==null)return {s:"na",imp:0};const d1=distOut(v1,mn,mx),d2=distOut(v2,mn,mx);const imp=d1-d2;if(imp>0.4)return {s:"up",imp};if(imp<-0.4)return {s:"down",imp};return {s:"eqc",imp};}
function pill(st){const t=st==="up"?"melhorou":st==="down"?"piorou":st==="na"?"—":"manteve";const ar=st==="up"?"▲":st==="down"?"▼":st==="na"?"":"=";return `<span class="stpill ${st}">${ar} ${t}</span>`;}
function cmpValA(name,idx,key){const p=PMAP[name];return p?p.samples[idx].vals[key]:null;}
function renderCompare(){
  const mm=MASTER.players.filter(p=>p.kind==="player");
  if(cmpPlayer===null){const f=mm.find(p=>p.samples.length>=2)||mm[0];cmpPlayer=f?f.name:null;}
  const p=PMAP[cmpPlayer];
  const cont=document.getElementById("content");
  if(!p){cont.innerHTML=`<div class="loader">Sem jogadores.</div>`;return;}
  if(p.samples.length<2){
    cont.innerHTML=`<div class="secthead"><h1 class="secttitle">Comparar samples · <span class="pname">${cmpPlayer}</span></h1></div>`+
     `<div class="diag mini"><h4>◆ Comparação</h4><b>${cmpPlayer}</b> ainda tem só uma sample (${p.samples[0].label}). Assim que você catalogar um segundo período, a evolução aparece aqui — sample 1 à esquerda, sample 2 à direita, com ▲/▼ mostrando onde melhorou ou piorou.</div>`+
     playerPicker();
    bindCompareBar();return;
  }
  if(cmpA>=p.samples.length)cmpA=0; if(cmpB>=p.samples.length)cmpB=p.samples.length-1; if(cmpA===cmpB)cmpB=(cmpA+1)%p.samples.length;
  const A=p.samples[cmpA],B=p.samples[cmpB];
  let html=`<div class="secthead"><h1 class="secttitle">Comparar · <span class="pname">${cmpPlayer}</span></h1></div>`;
  html+=`<div class="pfhead">Esquerda = sample 1 (base) · Direita = sample 2 (nova). O status compara a stat nova com a antiga, cruzando com a faixa-alvo.</div>`;
  html+=playerPicker();
  // perfil (descritivas)
  html+=`<div class="pfgroup"><div class="glbl">Perfil</div><div class="cmptiles">`;
  html+=cmpDescTile("Mãos",A.hands,B.hands,null);
  html+=cmpDescTile("Win Rate EV",A.winrate,B.winrate,"higher");
  html+=cmpDescTile("Won s/ Showdown",A.wonNoSD,B.wonNoSD,"higher");
  const wA=cmpValA(cmpPlayer,cmpA,"Preflop|||Pós-flop (geral)|||WWSF"),wB=cmpValA(cmpPlayer,cmpB,"Preflop|||Pós-flop (geral)|||WWSF");
  html+=cmpDescTile("WWSF",wA,wB,null);
  html+=`</div></div>`;
  // top melhorias / pioras
  const changes=[];
  MASTER.sections.forEach(sec=>sec.groups.forEach(g=>g.stats.forEach(s=>{if(!hasRange(s))return;const k=sec.name+"|||"+g.name+"|||"+s.stat;const v1=A.vals[k],v2=B.vals[k];const st=cmpStatus(v1,v2,s.min,s.max);if(st.s==="up"||st.s==="down")changes.push({sec:sec.name,stat:s.stat,v1,v2,st});})));
  const ups=changes.filter(c=>c.st.s==="up").sort((a,b)=>b.st.imp-a.st.imp).slice(0,6);
  const downs=changes.filter(c=>c.st.s==="down").sort((a,b)=>a.st.imp-b.st.imp).slice(0,6);
  html+=`<div class="cmpcols"><div class="cmpcol up"><h4>▲ Onde mais melhorou</h4>`;
  html+= ups.length?ups.map(c=>cmpMiniRow(c)).join(""):`<div class="hint">—</div>`;
  html+=`</div><div class="cmpcol down"><h4>▼ Onde mais piorou</h4>`;
  html+= downs.length?downs.map(c=>cmpMiniRow(c)).join(""):`<div class="hint">—</div>`;
  html+=`</div></div>`;
  // por seção (só o que mudou)
  html+=`<div class="smtitle">Detalhe por seção (só o que mudou)</div>`;
  MASTER.sections.forEach(sec=>{
    const rows=[];
    sec.groups.forEach(g=>g.stats.forEach(s=>{if(!hasRange(s))return;const k=sec.name+"|||"+g.name+"|||"+s.stat;const v1=A.vals[k],v2=B.vals[k];const st=cmpStatus(v1,v2,s.min,s.max);if(st.s==="up"||st.s==="down")rows.push({s,v1,v2,st});}));
    if(!rows.length)return;
    html+=`<div class="cmpsec"><h3>${labelFor(sec.name)} — ${rows.length} mudança(s)</h3><table class="cmptbl"><thead><tr><th>Stat</th><th>Sample 1</th><th>Sample 2</th><th>Alvo</th><th>Status</th></tr></thead><tbody>`;
    rows.forEach(r=>{const cB=classify(r.v2,r.s.min,r.s.max);const colB=cB==="red"?"var(--red)":cB==="green"?"var(--green)":"var(--text)";
      html+=`<tr><td data-tip='<div class="tt">o que é</div><b>${decode(r.s.stat)}</b>' style="cursor:help">${r.s.stat}</td><td class="va">${fmt(r.v1)}</td><td class="vb" style="color:${colB}">${fmt(r.v2)}</td><td style="color:var(--muted2)">${faixaTxt(r.s.min,r.s.max)}</td><td>${pill(r.st.s)}</td></tr>`;});
    html+=`</tbody></table></div>`;
  });
  cont.innerHTML=html;bindTips(cont);bindCompareBar();
}
function playerPicker(){
  const mm=MASTER.players.filter(p=>p.kind==="player");const p=PMAP[cmpPlayer];
  let h=`<div class="cmpbar"><div class="cmpsel"><span class="cl">Jogador</span><div>`;
  mm.forEach(m=>h+=`<span class="schip cmp-p ${m.name===cmpPlayer?'active':''}" data-p="${m.name}">${m.name}</span>`);
  h+=`</div></div>`;
  if(p&&p.samples.length>=2){
    h+=`<div class="cmpsel"><span class="cl a">Sample 1 (base)</span><div>`;p.samples.forEach((s,i)=>h+=`<span class="schip cmp-a ${i===cmpA?'active':''}" data-i="${i}">${s.label}</span>`);h+=`</div></div>`;
    h+=`<div class="cmpsel"><span class="cl b">Sample 2 (nova)</span><div>`;p.samples.forEach((s,i)=>h+=`<span class="schip cmp-b ${i===cmpB?'active':''}" data-i="${i}">${s.label}</span>`);h+=`</div></div>`;
  }
  h+=`</div>`;return h;
}
function bindCompareBar(){
  document.querySelectorAll(".cmp-p").forEach(el=>el.onclick=()=>{cmpPlayer=el.dataset.p;cmpA=0;cmpB=(PMAP[cmpPlayer].samples.length>1)?1:0;render();});
  document.querySelectorAll(".cmp-a").forEach(el=>el.onclick=()=>{cmpA=+el.dataset.i;render();});
  document.querySelectorAll(".cmp-b").forEach(el=>el.onclick=()=>{cmpB=+el.dataset.i;render();});
}
function cmpMiniRow(c){return `<div class="cmprow"><span class="nmn">${c.stat} <span style="color:var(--muted2);font-size:11px">· ${labelFor(c.sec)}</span></span><span class="vv">${fmt(c.v1)} <span class="ar">→</span> <b>${fmt(c.v2)}</b></span>${pill(c.st.s)}</div>`;}
function pnum(x){if(x==null)return null;if(typeof x==="number")return x;const s=(""+x).toLowerCase().trim();let m=1;let t=s;if(t.endsWith("k")){m=1e3;t=t.slice(0,-1);}else if(t.endsWith("m")){m=1e6;t=t.slice(0,-1);}const f=parseFloat(t);return isNaN(f)?null:f*m;}
function cmpDescTile(label,a,b,better){
  let st="eqc";
  if(better==="higher"){const na=pnum(a),nb=pnum(b);if(na!=null&&nb!=null){if(nb-na>0.3)st="up";else if(nb-na<-0.3)st="down";}}
  const stTxt=better?pill(st):"";
  return `<div class="ctile"><div class="ck">${label}</div><div class="cvs"><span class="a">${a==null?'–':a}</span><span class="ar">→</span><span class="b ${st==='up'?'up':st==='down'?'down':''}">${b==null?'–':b}</span></div><div class="st">${stTxt}</div></div>`;
}

/* render principal */
function render(){renderPlayerDropdown();renderSampleSelector();renderNav();
  if(curSection==="__compare__")renderCompare();
  else if(curSection==="__overview__")renderOverview();
  else{const sec=DATA.sections.find(s=>s.name===curSection);if(sec)renderSection(sec);else renderOverview();}
  window.scrollTo(0,0);}

/* carregamento */
function initMaster(){
  PMAP={};BENCHSET={};PLAYERS=[];
  MASTER.players.forEach(p=>{PMAP[p.name]=p;curSample[p.name]=0;if(p.kind==="benchmark")BENCHSET[p.name]=1;else PLAYERS.push(p.name);});
  rebuildData();
}
async function loadDiag(){try{const r=await fetch("diagnoses.json",{cache:"no-store"});if(r.ok)DIAG=await r.json();}catch(e){}if(window.__DIAG__)DIAG=window.__DIAG__;}
async function loadPlayers(){try{const r=await fetch("players.json",{cache:"no-store"});if(r.ok){MASTER=await r.json();return true;}}catch(e){}if(window.__PLAYERS__){MASTER=window.__PLAYERS__;return true;}return false;}
(async()=>{await loadDiag();
  if(await loadPlayers()){initMaster();render();return;}
  document.getElementById("content").innerHTML='<div class="loader">Não consegui carregar os dados (players.json).</div>';})();
</script>
</body>
