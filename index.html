<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guerreiros Poker Team — Leak Finder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0e1217; --panel:#151b23; --panel2:#1b2531; --panel3:#212d3a;
  --border:#26313f; --text:#e8eef5; --muted:#8a97a6; --muted2:#5f6d7d;
  --blue:#4f9dff; --blue-deep:#2b6fd6; --blue-dim:#16304d; --blue-soft:#1d2b3d;
  --red:#f0616d; --red-bg:#2a1418; --green:#43c98a; --green-bg:#10281d;
  --gold:#f0b429; --gold-deep:#b8860b;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:inherit}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:248px;flex:0 0 248px;background:linear-gradient(180deg,#131a24,#0e1217);border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;padding:0 0 24px}
.brand{padding:22px 18px 18px;border-bottom:1px solid var(--border);text-align:center}
.brand .logo{display:flex;flex-direction:column;align-items:center;gap:10px}
.brand .badge-logo{width:84px;height:84px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(240,180,41,.18)}
.brand .badge-logo img,.brand .badge-logo svg{width:84px;height:84px;object-fit:contain;display:block}
.brand h1{font-size:15.5px;margin:0;letter-spacing:.3px;line-height:1.25}
.brand .sub{color:var(--gold);font-size:11px;margin-top:3px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.navlabel{color:var(--muted2);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;padding:16px 20px 6px}
.navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 18px 9px 20px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;font-size:13px;transition:.12s}
.navitem:hover{background:var(--panel);color:var(--text)}
.navitem.active{background:linear-gradient(90deg,var(--blue-dim),transparent);color:#fff;border-left-color:var(--blue);font-weight:600}
.navitem .nm{display:flex;align-items:center;gap:8px;min-width:0}
.navitem .num{color:var(--muted2);font-size:11px;width:15px;text-align:right;flex:0 0 auto}
.navitem.active .num{color:var(--blue)}
.navitem .badge{font-size:10.5px;color:var(--muted2);white-space:nowrap;font-variant-numeric:tabular-nums}
.badge .r{color:var(--red);font-weight:700} .badge .g{color:var(--green);font-weight:700} .badge .t{color:var(--muted2)}
.navitem .ok{color:var(--blue);font-weight:700;font-size:11px}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:16px;padding:14px 26px;border-bottom:1px solid var(--border);background:rgba(14,18,23,.7);backdrop-filter:blur(6px);position:sticky;top:0;z-index:5;flex-wrap:wrap}
.topbar h2{margin:0;font-size:18px;font-weight:700}
.topbar .spacer{flex:1}
.players{display:flex;gap:6px;flex-wrap:wrap}
.pchip{padding:6px 13px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12.5px;font-weight:600;transition:.12s}
.pchip:hover{color:var(--text);border-color:var(--blue-deep)}
.pchip.active{background:var(--blue);border-color:var(--blue);color:#04101f}
.pchip.all.active{background:linear-gradient(135deg,var(--blue),var(--blue-deep))}
.pchip.bench{border-color:var(--gold-deep);color:var(--gold)}
.pchip.bench.active{background:linear-gradient(135deg,var(--gold),var(--gold-deep));border-color:var(--gold);color:#231602}
.btn{padding:7px 13px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:12.5px;font-weight:600}
.btn:hover{border-color:var(--blue-deep)}
.updated{color:var(--muted2);font-size:11px}
.content{padding:24px 26px 70px;max-width:1500px}

/* legend */
.legend{display:flex;gap:18px;align-items:center;color:var(--muted);font-size:12px;margin:2px 0 20px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:7px}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.dot.n{background:#c9d4e0} .dot.r{background:var(--red)} .dot.g{background:var(--green)}

/* section header */
.secthead{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin:0 0 4px}
.secttitle{font-size:26px;font-weight:800;margin:0}
.secttitle .pname{color:var(--blue)}
.counts{display:inline-flex;gap:14px;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.counts .r{color:var(--red)} .counts .g{color:var(--green)} .counts .t{color:var(--muted2);font-weight:600}
.sectsub{color:var(--muted);font-size:13px;margin:2px 0 16px}
.arrow{font-size:.82em;vertical-align:middle}

/* tables (hand2note style) */
.tbl-wrap{overflow-x:auto;margin-bottom:20px}
.tblcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px 16px;margin-bottom:18px;box-shadow:var(--shadow);display:inline-block;min-width:min(100%,340px);vertical-align:top}
.tblcard h3{margin:0 0 12px;font-size:12.5px;font-weight:700;color:var(--blue);letter-spacing:.3px;text-transform:uppercase}
.tblgrid{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
table.mtx,table.strip,table.linetbl{border-collapse:separate;border-spacing:4px;font-variant-numeric:tabular-nums}
.mtx th,.strip th{color:var(--muted2);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;padding:4px 8px;text-align:center;white-space:nowrap}
.mtx td.corner{background:transparent}
.mtx td.rowh{color:var(--text);font-weight:700;font-size:11.5px;text-align:left;padding:6px 10px 6px 6px;white-space:nowrap}
.mc{min-width:52px;text-align:center;padding:7px 10px;border-radius:8px;background:var(--panel2);font-weight:700;font-size:13px;transition:.1s}
.mc.empty{background:transparent}
.mc.na{color:var(--muted2);font-weight:400;background:var(--panel2)}
.mc.neutral{color:#eaf1f8}
.mc.normal{color:#eaf1f8}
.mc.red{color:var(--red);background:var(--red-bg)}
.mc.green{color:var(--green);background:var(--green-bg)}
.mc[data-tip]{cursor:help}
.mc[data-tip]:hover{outline:1px solid var(--blue);outline-offset:-1px}
.strip .mc{min-width:60px}
.linetbl td.ln{color:var(--text);font-size:11.5px;text-align:left;padding:5px 10px 5px 4px;white-space:nowrap;font-weight:600}
.linetbl .mc{min-width:64px}
.streets{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
.street{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px 14px;box-shadow:var(--shadow);min-width:220px}
.street h4{margin:0 0 8px;font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.5px}

/* tooltip */
#tip{position:fixed;z-index:50;background:#0b1017;border:1px solid var(--blue-deep);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .1s;max-width:240px}
#tip .tt{color:var(--muted2);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px}
#tip b{color:var(--blue)} #tip .rr{color:var(--red)} #tip .gg{color:var(--green)}

/* overview: player profile */
.pfhead{font-size:13px;color:var(--muted);margin:0 0 12px}
.pfgroup{margin-bottom:8px}
.pfgroup .glbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);font-weight:700;margin:14px 0 8px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 15px;position:relative}
.tile .tv{font-size:24px;font-weight:800;line-height:1}
.tile .tv.red{color:var(--red)} .tile .tv.green{color:var(--green)} .tile .tv.neutral,.tile .tv.normal{color:#eaf1f8}
.tile .tk{font-size:12.5px;font-weight:700;margin-top:7px;color:var(--text)}
.tile .td{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.25}
.tile .frng{font-size:10px;color:var(--muted2);margin-top:5px;font-variant-numeric:tabular-nums}

/* overview: section menu cards */
.smtitle{font-size:13px;color:var(--muted);margin:22px 0 10px;font-weight:600}
.secmenu{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.seccard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 14px;cursor:pointer;transition:.12s;position:relative}
.seccard:hover{border-color:var(--blue);transform:translateY(-1px)}
.seccard .sn{font-size:10.5px;color:var(--muted2);font-weight:700}
.seccard .st{font-size:14px;font-weight:700;margin:3px 0 9px}
.seccard .sc{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;display:flex;gap:12px;align-items:center}
.seccard .sc .r{color:var(--red)} .seccard .sc .g{color:var(--green)}
.seccard .sc .ok{color:var(--blue)}

/* overview heatmap (Todos) */
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:150px}
.kpi .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:26px;font-weight:800;margin-top:4px}
.kpi .v.blue{color:var(--blue)} .kpi .v.red{color:var(--red)} .kpi .v.green{color:var(--green)}
.ovwrap{overflow-x:auto}
.heat{border-collapse:separate;border-spacing:6px;min-width:900px}
.heat th{font-size:11px;color:var(--muted);text-align:center;padding:4px 6px}
.heat td.pl{text-align:left;font-weight:700;color:var(--text);padding-right:12px;cursor:pointer}
.heat td.pl:hover{color:var(--blue)}
.cell{min-width:76px;border-radius:9px;background:var(--panel2);border:1px solid var(--border);padding:8px 8px;text-align:center;cursor:pointer;transition:.12s;line-height:1.25}
.cell:hover{border-color:var(--blue);transform:translateY(-1px)}
.cell .rr{color:var(--red);font-weight:800;font-size:14px} .cell .rr .arrow{color:var(--red)}
.cell .gg{color:var(--green);font-weight:800;font-size:14px} .cell .gg .arrow{color:var(--green)}
.cell.clean{display:flex;align-items:center;justify-content:center}
.cell .okbig{color:var(--blue);font-weight:800;font-size:17px;letter-spacing:.5px}
.ovnote{color:var(--muted);font-size:12.5px;margin:16px 0 6px}
.hint{color:var(--muted2);font-size:12.5px;margin:10px 0}
.loader{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:960px){.tiles,.secmenu{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.sidebar{display:none}.content{padding:16px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">
        <div class="badge-logo" id="logoBox"></div>
        <div>
          <h1>Guerreiros Poker Team</h1>
          <div class="sub">Mentoria · Leak Finder</div>
        </div>
      </div>
    </div>
    <div class="navlabel">Painel</div>
    <div id="nav"></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="topTitle">Visão Geral</h2>
      <div class="spacer"></div>
      <div class="players" id="players"></div>
      <label class="btn" for="file">⭱ Trocar planilha</label>
      <input id="file" type="file" accept=".xlsx" style="display:none">
      <div class="updated" id="updated"></div>
    </div>
    <div class="content" id="content"><div class="loader">Carregando…</div></div>
  </div>
</div>
<div id="tip"></div>
<script>
/* ============ constantes ============ */
const PLAYERS=["Camisa","Danilo","Dudu","Paciraro","Schmidt"];
const BENCH="Reg Aggro";
const XLSX_FILE="Guerreiros_Catalogo.xlsx";
let DATA=null, curSection="__overview__", curPlayer="Todos";

/* perfil: stats descritivas (das capturas de julho — hands / winrate EV / won s/ showdown).
   As demais (VPIP,PFR,3BET,F3BET,WWSF) vêm da planilha, com faixa. */
const PROFILE_EXTRA={
  "Camisa":  {hands:"174k", winrate:11,  wonNoSD:-16},
  "Danilo":  {hands:"91k",  winrate:10,  wonNoSD:-15},
  "Dudu":    {hands:"177k", winrate:2.4, wonNoSD:-18},
  "Paciraro":{hands:"158k", winrate:5.6, wonNoSD:-17},
  "Schmidt": {hands:"102k", winrate:8.5, wonNoSD:-7.2},
  "Reg Aggro":{hands:"22m", winrate:6.7, wonNoSD:-6.9}
};

/* ============ logo (placeholder swappável por logo.png) ============ */
const LOGO_SVG=`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs><radialGradient id="bg" cx="50%" cy="38%" r="72%"><stop offset="0%" stop-color="#1c1208"/><stop offset="100%" stop-color="#0a0a0c"/></radialGradient>
<linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd766"/><stop offset="55%" stop-color="#e0a92a"/><stop offset="100%" stop-color="#a9750a"/></linearGradient>
<linearGradient id="red" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8342b"/><stop offset="100%" stop-color="#9c1712"/></linearGradient></defs>
<circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="url(#gold)" stroke-width="3.5"/>
<circle cx="50" cy="50" r="41.5" fill="none" stroke="#3a2a0d" stroke-width="1"/>
<!-- crista (plume) vermelha -->
<path d="M50 14 C58 19 63 27 62 35 L56.5 35 C56 29 53.5 24.5 50 22 C46.5 24.5 44 29 43.5 35 L38 35 C37 27 42 19 50 14 Z" fill="url(#red)"/>
<!-- capacete corinthian, de frente -->
<path d="M34 41 C34 30 41 25 50 25 C59 25 66 30 66 41 L66 53 C66 64 59 71 50 74 C41 71 34 64 34 53 Z" fill="url(#gold)"/>
<!-- borda interna -->
<path d="M37 42 C37 33 43 29 50 29 C57 29 63 33 63 42 L63 52 C63 62 57 68 50 70.5 C43 68 37 62 37 52 Z" fill="none" stroke="#8a6208" stroke-width="1" opacity="0.7"/>
<!-- olheiras (eye slits) -->
<path d="M40 44 C42 43 45.5 43 47 44 L47 49 C45 50 42 50 40 49 Z" fill="#0a0a0c"/>
<path d="M60 44 C58 43 54.5 43 53 44 L53 49 C55 50 58 50 60 49 Z" fill="#0a0a0c"/>
<!-- protetor nasal -->
<rect x="48.4" y="45" width="3.2" height="21" rx="1.3" fill="#0a0a0c"/>
<!-- naipes: espadas e paus -->
<path d="M30 70 C27 73.5 29.6 77 32.4 74.4 C31.6 76.6 30.9 77.6 30 78.5 L35.6 78.5 C34.7 77.6 34 76.6 33.2 74.4 C36 77 38.6 73.5 35.6 70 C33.6 67.4 32 67.4 30 70 Z" fill="url(#gold)"/>
<path d="M70 71 C67.6 71 66 73 66.6 75 C64.8 74 62.6 75.4 63.2 77.4 C63.6 78.8 65.4 79 66.6 78.2 C66.3 79.2 65.6 80 64.8 80.6 L75.2 80.6 C74.4 80 73.7 79.2 73.4 78.2 C74.6 79 76.4 78.8 76.8 77.4 C77.4 75.4 75.2 74 73.4 75 C74 73 72.4 71 70 71 Z" fill="#e8e8ea"/>
</svg>`;
(function initLogo(){
  const box=document.getElementById("logoBox");
  const img=new Image();
  img.onload=()=>{box.innerHTML="";box.appendChild(img);};
  img.onerror=()=>{box.innerHTML=LOGO_SVG;};
  img.src="logo.png";
  box.innerHTML=LOGO_SVG; // mostra o placeholder já; troca se logo.png existir
})();

/* ============ parsing ============ */
function toNum(v){
  if(v===null||v===undefined||v==="")return null;
  if(typeof v==="number")return v;
  let s=(""+v).trim().replace(",",".");
  if(s==="-"||s==="–"||s==="--")return null;
  let f=parseFloat(s); return isNaN(f)?null:f;
}
function norm(s){return (s===null||s===undefined?"":(""+s)).trim().toLowerCase();}
function parseWorkbook(wb){
  const sections=[];
  wb.SheetNames.forEach(sh=>{
    if(norm(sh)==="índice"||norm(sh)==="indice")return;
    const ws=wb.Sheets[sh];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    if(!rows.length)return;
    const hdr={}; rows[0].forEach((h,i)=>hdr[norm(h)]=i);
    const ci={nome:hdr["nome da stat"]??0,reg:hdr["reg aggro"],min:hdr["mínimo"]??hdr["minimo"],
      max:hdr["máximo"]??hdr["maximo"],obs:hdr["obs."]??hdr["obs"]};
    const pc={}; PLAYERS.forEach(p=>pc[p]=hdr[p.toLowerCase()]);
    const groups=[]; let cur=null;
    for(let r=1;r<rows.length;r++){
      const row=rows[r]; if(!row)continue;
      const name=row[ci.nome]; const reg=ci.reg!=null?row[ci.reg]:null;
      if(name===null||name===undefined||(""+name).trim()==="")continue;
      if(reg===null||reg===undefined||(""+reg).trim()===""){cur={name:(""+name).trim(),stats:[]};groups.push(cur);continue;}
      if(!cur){cur={name:"",stats:[]};groups.push(cur);}
      const st={stat:(""+name).trim(),reg:toNum(reg),min:ci.min!=null?toNum(row[ci.min]):null,
        max:ci.max!=null?toNum(row[ci.max]):null,vals:{}};
      PLAYERS.forEach(p=>st.vals[p]=pc[p]!=null?toNum(row[pc[p]]):null);
      const o=ci.obs!=null?row[ci.obs]:null; if(o) st.obs=(""+o);
      cur.stats.push(st);
    }
    sections.push({name:sh,groups});
  });
  return {meta:{players:PLAYERS},sections};
}

/* ============ layouts das seções (estilo hand2note) ============ */
const LAYOUTS={
 "Stack Sizes":[
   {kind:"matrix",title:"VPIP / PFR por faixa de stack",rowLabel:"Faixa",
    rows:["[0;12]","[12;19]","[19;30]","[30;60]","[60;100]",">100"],cols:["VPIP","PFR"],
    key:(r,c)=>({group:"VPIP / PFR por faixa de stack",stat:c+" "+r})}
 ],
 "Positions":[
   {kind:"matrix",title:"VPIP / PFR / Win Rate por posição",rowLabel:"Posição",
    rows:["BB","SB","BTN","CO","MP","EP","UTG #1","UTG #2"],cols:["VPIP","PFR","WR"],
    colLbl:{VPIP:"VPIP",PFR:"PFR",WR:"Win Rate"},
    key:(r,c)=> c==="WR"?({group:"Win Rate por posição  (bb/100)",stat:"WR "+r})
                        :({group:"VPIP / PFR por posição",stat:c+" "+r})}
 ],
 "Preflop":[
   {kind:"strip",title:"Geral (topo)",stats:[
     {group:"GERAL (topo do print)",stat:"VPIP"},{group:"GERAL (topo do print)",stat:"PFR"},
     {group:"GERAL (topo do print)",stat:"3BET"},{group:"GERAL (topo do print)",stat:"F3BET"},
     {group:"GERAL (topo do print)",stat:"SQZ"},{group:"GERAL (topo do print)",stat:"4BET"},
     {group:"GERAL (topo do print)",stat:"F4BET"}]},
   {kind:"matrix",title:"RFI / 3BET / FLAT por posição",rowLabel:"Posição",
    rows:["UTG","MP","LJ","HJ","CO","BTN","SB","BB"],cols:["RFI","3BET","FLAT"],
    key:(r,c)=> c==="RFI"?({group:"RFI por posição",stat:"RFI "+r})
              : c==="3BET"?({group:"3BET por posição",stat:"3BET "+r})
              : ({group:"FLAT / CALL por posição",stat:"FLAT "+r})},
   {kind:"strip",title:"Pós-flop (geral)",stats:[
     {group:"Pós-flop (geral)",stat:"WWSF"},{group:"Pós-flop (geral)",stat:"WSD"},
     {group:"Pós-flop (geral)",stat:"W$SD"}]}
 ],
 "RFI":[
   {kind:"matrix",title:"RFI — posição × faixa de stack",rowLabel:"Posição",
    rows:["UTG","MP","LJ","HJ","CO","BTN","SB"],
    cols:["ALL","< 12","12-19","19-30","30-60","> 60"],
    colGroup:{"ALL":"RFI — ALL","< 12":"RFI — < 12 bb","12-19":"RFI — 12 - 19 bb","19-30":"RFI — 19 - 30 bb","30-60":"RFI — 30 - 60 bb","> 60":"RFI — > 60 bb"},
    key:function(r,c){return {group:this.colGroup[c],stat:"RFI "+r};}}
 ],
 "3Bet Simple":[
   {kind:"matrix",title:"3BET — herói (linha) × quem abriu (coluna)",rowLabel:"Herói",
    rows:["MP","LJ","HJ","CO","BTN","SB","BB"],cols:["UTG","MP","LJ","HJ","CO","BTN","SB"],
    colPre:"vs ",key:(r,c)=>({group:"Herói "+r,stat:"3BET "+r+" vs "+c})},
   {kind:"matrix",title:"FOLD to 3BET",rowLabel:"Posição",
    rows:["UTG","MP","LJ","HJ","CO","BTN","SB"],cols:["IP","OOP"],
    key:(r,c)=>({group:c==="IP"?"FOLD to 3BET — In Position (IP)":"FOLD to 3BET — Out of Position (OOP)",stat:"F3BET "+r+" ("+c+")"})}
 ],
 "3Bet Resteal":[
   {kind:"matrix",title:"3BET Resteal (all-in) — herói × quem abriu · < 20 BBs",rowLabel:"Herói",
    rows:["BB","SB","BTN","CO","HJ","MP","EP"],cols:["EP","MP","HJ","CO","BTN","SB"],
    colPre:"vs ",key:(r,c)=>({group:"Herói "+r,stat:"3BET-RS "+r+" vs "+c+" (AI)"})}
 ],
 "BB Defense":[
   {kind:"matrix",title:"Small Blind — ALL",rowLabel:"Abriu",
    rows:["TOTAL","BTN","CO","MP","EP"],cols:["FOLD","CALL","3B NAI","3B AI"],
    key:(r,c)=>({group:"SMALL BLIND — ALL",stat:r+" · "+c})},
   {kind:"matrix",title:"Big Blind — ALL",rowLabel:"Abriu",
    rows:["TOTAL","BTN","CO","MP","EP"],cols:["FOLD","CALL","3B NAI","3B AI"],
    key:(r,c)=>({group:"BIG BLIND — ALL",stat:r+" · "+c})}
 ],
 "Blind War":[
   {kind:"matrix",title:"SB vs BB",rowLabel:"Ação",
    rows:["RFI","SHOVE","LIMP/CALL","LIMP/FOLD","LIMP/RAISE"],
    cols:["ALL STACKS","0 - 20 BBs","20 - 50 BBs","50 BBs +"],
    key:(r,c)=>({group:c+" — SB vs BB",stat:r})},
   {kind:"matrix",title:"BB vs SB",rowLabel:"Ação",
    rows:["CALL","FOLD","3B NAI","3B AI","R VS L","X VS L"],
    cols:["ALL STACKS","0 - 20 BBs","20 - 50 BBs","50 BBs +"],
    key:(r,c)=>({group:c+" — BB vs SB",stat:r})}
 ]
};
const POSTFLOP=["IP Agressor","OOP Agressor","IP Passivo","OOP Passivo"];

/* ============ helpers de valor/cor ============ */
function classify(v,mn,mx){
  if(v===null||v===undefined)return "na";
  if(mn!==null&&mn!==undefined&&v<mn)return "red";
  if(mx!==null&&mx!==undefined&&v>mx)return "green";
  return "normal";
}
function fmt(v){ if(v===null||v===undefined)return "–"; return (Math.round(v*100)/100); }
function faixaTxt(mn,mx){
  if(mn===null&&mx===null)return "sem faixa";
  if(mn!==null&&mx===null)return "≥ "+fmt(mn);
  if(mn===null&&mx!==null)return "≤ "+fmt(mx);
  return fmt(mn)+" – "+fmt(mx);
}
function valueFor(s,player){ return player===BENCH ? s.reg : (s.vals?s.vals[player]:null); }
function hasRange(s){ return s.min!==null&&s.min!==undefined || s.max!==null&&s.max!==undefined; }
function classFor(s,player){
  const v=valueFor(s,player);
  if(v===null||v===undefined)return "na";
  if(player===BENCH||!hasRange(s))return "neutral";
  return classify(v,s.min,s.max);
}
/* contagem por seção/jogador */
function sectionRanged(sec){let n=0;sec.groups.forEach(g=>g.stats.forEach(s=>{if(hasRange(s))n++;}));return n;}
function countSec(sec,player){
  let r=0,g=0;
  const ps = player==="Todos"?PLAYERS:[player];
  sec.groups.forEach(gr=>gr.stats.forEach(s=>{
    if(!hasRange(s))return;
    ps.forEach(p=>{const c=classify(s.vals[p],s.min,s.max); if(c==="red")r++; else if(c==="green")g++;});
  }));
  return {r,g,t:sectionRanged(sec)*ps.length};
}
function getStat(secName,groupName,statName){
  const sec=DATA.sections.find(s=>s.name===secName); if(!sec)return null;
  const g=sec.groups.find(g=>g.name===groupName); if(!g)return null;
  return g.stats.find(s=>s.stat===statName)||null;
}

/* ============ tooltip ============ */
const tipEl=document.getElementById("tip");
function bindTips(root){
  root.querySelectorAll("[data-tip]").forEach(el=>{
    el.addEventListener("mousemove",e=>{
      tipEl.innerHTML=el.getAttribute("data-tip");
      tipEl.style.opacity="1";
      let x=e.clientX+14, y=e.clientY+16;
      const w=tipEl.offsetWidth,h=tipEl.offsetHeight;
      if(x+w>window.innerWidth-8)x=e.clientX-w-14;
      if(y+h>window.innerHeight-8)y=e.clientY-h-16;
      tipEl.style.left=x+"px"; tipEl.style.top=y+"px";
    });
    el.addEventListener("mouseleave",()=>{tipEl.style.opacity="0";});
  });
}

/* ============ nav (menu esquerdo) ============ */
function badgeHTML(c){
  if(!c.r&&!c.g)return `<span class="ok">OK</span>`;
  return `<span class="badge"><span class="r">${c.r}<span class="arrow">▼</span></span> <span class="g">${c.g}<span class="arrow">▲</span></span> <span class="t">(${c.t})</span></span>`;
}
function renderNav(){
  const nav=document.getElementById("nav");
  const who = curPlayer==="Todos"?"Todos":curPlayer;
  let html=`<div class="navitem ${curSection==='__overview__'?'active':''}" data-sec="__overview__"><span class="nm">▦ Visão Geral</span></div>`;
  html+=`<div class="navlabel">Seções</div>`;
  DATA.sections.forEach((sec,i)=>{
    const c = who===BENCH?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,who);
    html+=`<div class="navitem ${curSection===sec.name?'active':''}" data-sec="${sec.name}">
      <span class="nm"><span class="num">${i+1}</span><span>${sec.name}</span></span>${badgeHTML(c)}</div>`;
  });
  nav.innerHTML=html;
  nav.querySelectorAll(".navitem").forEach(el=>el.onclick=()=>{curSection=el.dataset.sec;render();});
}
function renderPlayers(){
  const el=document.getElementById("players");
  const opts=["Todos",BENCH,...PLAYERS];
  el.innerHTML=opts.map(p=>{
    const cls=p==="Todos"?"all":p===BENCH?"bench":"";
    return `<div class="pchip ${cls} ${curPlayer===p?'active':''}" data-p="${p}">${p}</div>`;
  }).join("");
  el.querySelectorAll(".pchip").forEach(c=>c.onclick=()=>{curPlayer=c.dataset.p;render();});
}

/* ============ células/tabelas ============ */
function tipFor(s){
  const rng=faixaTxt(s.min,s.max);
  return `<div class="tt">alvo (faixa)</div><b>${rng}</b><div class="tt" style="margin-top:5px">reg aggro</div>${fmt(s.reg)}`;
}
function cellTd(s,player,extraClass){
  if(!s)return `<td class="mc empty"></td>`;
  const v=valueFor(s,player);
  const cls=classFor(s,player);
  if(v===null||v===undefined)return `<td class="mc na ${extraClass||''}">–</td>`;
  const tip = hasRange(s)? ` data-tip='${tipFor(s)}'` : ` data-tip='<div class="tt">sem faixa</div>descritiva'`;
  return `<td class="mc ${cls} ${extraClass||''}"${tip}>${fmt(v)}</td>`;
}
function matrixHTML(cfg,map,player){
  let h=`<div class="tblcard"><h3>${cfg.title}</h3><div class="tbl-wrap"><table class="mtx"><thead><tr><th class="corner"></th>`;
  cfg.cols.forEach(c=>h+=`<th>${(cfg.colPre||'')}${(cfg.colLbl&&cfg.colLbl[c])||c}</th>`);
  h+=`</tr></thead><tbody>`;
  cfg.rows.forEach(r=>{
    h+=`<tr><td class="rowh">${r}</td>`;
    cfg.cols.forEach(c=>{
      const kk=cfg.key(r,c); const s=kk?map[kk.group+"|||"+kk.stat]:null;
      h+=cellTd(s,player);
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}
function stripHTML(cfg,map,player){
  let h=`<div class="tblcard"><h3>${cfg.title}</h3><div class="tbl-wrap"><table class="strip"><thead><tr>`;
  cfg.stats.forEach(st=>h+=`<th>${st.stat}</th>`);
  h+=`</tr></thead><tbody><tr>`;
  cfg.stats.forEach(st=>{const s=map[st.group+"|||"+st.stat];h+=cellTd(s,player);});
  h+=`</tr></tbody></table></div></div>`;
  return h;
}
function streetsHTML(sec,player){
  let h=`<div class="streets">`;
  sec.groups.forEach(g=>{
    const ranged=g.stats.filter(hasRange);
    if(!ranged.length)return;
    h+=`<div class="street"><h4>${g.name}</h4><table class="linetbl"><tbody>`;
    ranged.forEach(s=>{ h+=`<tr><td class="ln">${s.stat}</td>${cellTd(s,player)}</tr>`; });
    h+=`</tbody></table></div>`;
  });
  h+=`</div>`;
  return h;
}
function buildMap(sec){const m={};sec.groups.forEach(g=>g.stats.forEach(s=>{m[g.name+"|||"+s.stat]=s;}));return m;}

/* ============ render seção ============ */
function renderSection(sec){
  let player=curPlayer;
  let note="";
  if(player==="Todos"){ player=BENCH; note=`Mostrando o perfil <b style="color:var(--gold)">Reg Aggro</b> (benchmark). Selecione um jogador acima para ver os dados dele.`; }
  document.getElementById("topTitle").textContent=sec.name;
  const c = player===BENCH?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,player);
  const cnt = player===BENCH
     ? `<span class="counts"><span class="t">${c.t} stats · benchmark</span></span>`
     : `<span class="counts"><span class="r">${c.r}<span class="arrow">▼</span></span><span class="g">${c.g}<span class="arrow">▲</span></span><span class="t">(${c.t})</span></span>`;
  let html=`<div class="secthead"><h1 class="secttitle">${sec.name} · <span class="pname">${player}</span></h1>${cnt}</div>`;
  html+=`<div class="legend"><span><i class="dot n"></i> OK</span><span><i class="dot r"></i> abaixo do mín.</span><span><i class="dot g"></i> acima do máx.</span><span style="color:var(--muted2)">passe o mouse na stat p/ ver a faixa</span></div>`;
  if(note)html+=`<div class="hint">${note}</div>`;
  const map=buildMap(sec);
  if(LAYOUTS[sec.name]){
    html+=`<div class="tblgrid">`;
    LAYOUTS[sec.name].forEach(cfg=>{
      html+= cfg.kind==="matrix"?matrixHTML(cfg,map,player):stripHTML(cfg,map,player);
    });
    html+=`</div>`;
  } else if(POSTFLOP.includes(sec.name)){
    html+=streetsHTML(sec,player);
  } else {
    html+=streetsHTML(sec,player);
  }
  const cont=document.getElementById("content");
  cont.innerHTML=html; bindTips(cont);
}

/* ============ render overview ============ */
function tileHTML(label,desc,value,cls,rngTxt){
  return `<div class="tile"><div class="tv ${cls}">${value}</div><div class="tk">${label}</div><div class="td">${desc}</div>${rngTxt?`<div class="frng">${rngTxt}</div>`:''}</div>`;
}
function profileTile(secName,groupName,statName,label,desc,player){
  const s=getStat(secName,groupName,statName);
  if(!s)return tileHTML(label,desc,"–","na","");
  const v=valueFor(s,player);
  const cls=classFor(s,player);
  const rng=hasRange(s)?("alvo "+faixaTxt(s.min,s.max)):"";
  return tileHTML(label,desc,fmt(v),cls,rng);
}
function renderPlayerOverview(player){
  document.getElementById("topTitle").textContent="Visão Geral · "+player;
  const ex=PROFILE_EXTRA[player]||{hands:"–",winrate:null,wonNoSD:null};
  let html=`<div class="secthead"><h1 class="secttitle">Perfil · <span class="pname">${player}</span></h1></div>`;
  html+=`<div class="pfhead">Resumo do jogador. Stats com faixa ficam <span style="color:var(--red)">vermelhas</span> abaixo do mínimo e <span style="color:var(--green)">verdes</span> acima do máximo.</div>`;
  // Grupo 1: geral / stack sizes
  html+=`<div class="pfgroup"><div class="glbl">Geral</div><div class="tiles">`;
  html+=tileHTML("Mãos","total de mãos jogadas",ex.hands,"neutral","");
  html+=profileTile("Preflop","Pós-flop (geral)","WWSF","WWSF","ganhou quando viu o flop (%)",player);
  html+=tileHTML("Won s/ Showdown","bb/100 ganho sem showdown",(ex.wonNoSD==null?"–":ex.wonNoSD),"neutral","");
  html+=tileHTML("Win Rate EV","bb/100 (ajustado por EV)",(ex.winrate==null?"–":ex.winrate),"neutral","");
  html+=`</div></div>`;
  // Grupo 2: preflop
  html+=`<div class="pfgroup"><div class="glbl">Preflop</div><div class="tiles">`;
  html+=profileTile("Preflop","GERAL (topo do print)","VPIP","VPIP","% que entra no pote",player);
  html+=profileTile("Preflop","GERAL (topo do print)","PFR","PFR","% que aumenta preflop",player);
  html+=profileTile("Preflop","GERAL (topo do print)","3BET","3BET","% de 3-bet",player);
  html+=profileTile("Preflop","GERAL (topo do print)","F3BET","F3BET","% que folda pro 3-bet",player);
  html+=`</div></div>`;
  // menu de seções 3x4
  html+=`<div class="smtitle">Seções — clique para abrir os leaks de ${player}</div><div class="secmenu">`;
  DATA.sections.forEach((sec,i)=>{
    const c = player===BENCH?{r:0,g:0,t:sectionRanged(sec)}:countSec(sec,player);
    const inner = (!c.r&&!c.g)?`<span class="ok">OK</span> <span style="color:var(--muted2);font-weight:600">(${c.t})</span>`
      :`<span class="r">${c.r}<span class="arrow">▼</span></span><span class="g">${c.g}<span class="arrow">▲</span></span><span style="color:var(--muted2);font-weight:600">(${c.t})</span>`;
    html+=`<div class="seccard" data-sec="${sec.name}"><div class="sn">Seção ${i+1}</div><div class="st">${sec.name}</div><div class="sc">${inner}</div></div>`;
  });
  html+=`</div>`;
  const cont=document.getElementById("content");
  cont.innerHTML=html; bindTips(cont);
  cont.querySelectorAll(".seccard").forEach(el=>el.onclick=()=>{curSection=el.dataset.sec;render();});
}
function renderHeatmap(){
  document.getElementById("topTitle").textContent="Visão Geral";
  let totR=0,totG=0;
  DATA.sections.forEach(sec=>PLAYERS.forEach(p=>{const c=countSec(sec,p);totR+=c.r;totG+=c.g;}));
  let html=`<div class="secthead"><h1 class="secttitle">Visão Geral</h1></div>`;
  html+=`<div class="pfhead">Quantas stats de cada jogador estão fora da faixa, por seção. Clique numa célula para abrir a seção do jogador.</div>`;
  html+=`<div class="kpis">
     <div class="kpi"><div class="k">Jogadores</div><div class="v blue">5</div></div>
     <div class="kpi"><div class="k">Seções</div><div class="v blue">${DATA.sections.length}</div></div>
     <div class="kpi"><div class="k">Abaixo do mínimo</div><div class="v red">${totR}</div></div>
     <div class="kpi"><div class="k">Acima do máximo</div><div class="v green">${totG}</div></div>
  </div>`;
  html+=`<div class="legend"><span><i class="dot r"></i> stat abaixo do mín.</span><span><i class="dot g"></i> stat acima do máx.</span></div>`;
  html+=`<div class="ovwrap"><table class="heat"><thead><tr><th class="pl"></th>`;
  DATA.sections.forEach(sec=>html+=`<th>${sec.name.replace(' ','<br>')}</th>`);
  html+=`</tr></thead><tbody>`;
  PLAYERS.forEach(p=>{
    html+=`<tr><td class="pl" data-p="${p}">${p}</td>`;
    DATA.sections.forEach(sec=>{
      const c=countSec(sec,p); const clean=(c.r+c.g)===0;
      if(clean){
        html+=`<td><div class="cell clean" data-sec="${sec.name}" data-p="${p}"><span class="okbig">OK</span></div></td>`;
      }else{
        html+=`<td><div class="cell" data-sec="${sec.name}" data-p="${p}">
          <div class="rr">${c.r}<span class="arrow">▼</span></div>
          <div class="gg">${c.g}<span class="arrow">▲</span></div></div></td>`;
      }
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="ovnote">Legenda: <span style="color:var(--red)">vermelho ▼</span> = abaixo do mínimo · <span style="color:var(--green)">verde ▲</span> = acima do máximo · <span style="color:var(--blue)">OK</span> = tudo dentro da faixa.</div>`;
  const cont=document.getElementById("content");
  cont.innerHTML=html;
  cont.querySelectorAll(".cell").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection=el.dataset.sec;render();});
  cont.querySelectorAll(".pl").forEach(el=>el.onclick=()=>{curPlayer=el.dataset.p;curSection="__overview__";render();});
}
function renderOverview(){
  if(curPlayer==="Todos")renderHeatmap();
  else renderPlayerOverview(curPlayer);
}

/* ============ render principal ============ */
function render(){
  renderPlayers(); renderNav();
  if(curSection==="__overview__")renderOverview();
  else { const sec=DATA.sections.find(s=>s.name===curSection); if(sec)renderSection(sec); else renderOverview(); }
  window.scrollTo(0,0);
}

/* ============ carregamento ============ */
function setUpdated(t){document.getElementById("updated").textContent=t;}
async function loadFromXlsx(){
  try{
    const res=await fetch(XLSX_FILE,{cache:"no-store"});
    if(!res.ok)throw 0;
    DATA=parseWorkbook(XLSX.read(await res.arrayBuffer(),{type:"array"}));
    setUpdated("planilha · "+XLSX_FILE); render(); return true;
  }catch(e){return false;}
}
async function loadFromJson(){
  try{
    const res=await fetch("data.json",{cache:"no-store"});
    if(!res.ok)throw 0;
    DATA=await res.json(); if(!DATA.meta)DATA.meta={players:PLAYERS};
    setUpdated("dados · data.json"); render(); return true;
  }catch(e){return false;}
}
document.getElementById("file").addEventListener("change",ev=>{
  const f=ev.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{DATA=parseWorkbook(XLSX.read(new Uint8Array(e.target.result),{type:"array"}));setUpdated("upload · "+f.name);curSection="__overview__";render();};
  rd.readAsArrayBuffer(f);
});
(async()=>{
  if(await loadFromXlsx())return;
  if(await loadFromJson())return;
  if(window.__EMBEDDED__){DATA=window.__EMBEDDED__;if(!DATA.meta)DATA.meta={players:PLAYERS};setUpdated("dados embutidos");render();return;}
  document.getElementById("content").innerHTML='<div class="loader">Não consegui carregar os dados. Use "Trocar planilha".</div>';
})();
</script>
